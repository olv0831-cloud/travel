<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Paul的分帳神器</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chartjs-plugin-datalabels@2"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        :root { --primary-color: #3b82f6; --bg-color: #f8fafc; --card-bg: #ffffff; --header-bg: #0f172a; --radius: 1.5rem; }
        body { background-color: var(--bg-color); color: #1e293b; font-family: sans-serif; transition: all 0.3s ease; }
        .card { background-color: var(--card-bg); border-radius: var(--radius); padding: 1.25rem; box-shadow: 0 4px 6px -1px rgba(0,0,0,0.1); border: 1px solid transparent; }
        .sticky-header { position: sticky; top: 0; z-index: 50; }
        .avatar { width: 32px; height: 32px; border-radius: 50%; border: 2px solid #fff; cursor: pointer; }
        .collapsible-content { max-height: 0; overflow: hidden; transition: max-height 0.3s ease-out; }
        .expanded { max-height: 800px; }
        .history-item { display: flex; justify-content: space-between; align-items: center; padding: 8px 12px; background: white; border-bottom: 1px solid #f1f5f9; font-size: 11px; color: #334155; }
        
        .theme-spring { --primary-color: #10b981; --bg-color: #f0fdf4; --radius: 0.5rem; }
        .theme-spring .card { border: 2px solid #10b981; box-shadow: 6px 6px 0px #d1fae5; }
        .theme-summer { --primary-color: #f59e0b; --bg-color: #fffbeb; --radius: 3rem 1rem; }
        .theme-summer .card { border: 2px dashed #fcd34d; }
        .theme-autumn { --primary-color: #ef4444; --bg-color: #fef2f2; }
        .theme-autumn .card { border-left: 8px solid #ef4444; border-radius: 0; }
        .theme-winter { --primary-color: #6366f1; --bg-color: #f5f3ff; }
        .theme-winter .card { backdrop-filter: blur(10px); background: rgba(255,255,255,0.7); border: 1px solid #e0e7ff; }
        .theme-classic { --primary-color: #3b82f6; --bg-color: #f8fafc; }

        @media print { .no-print { display: none !important; } }
    </style>
</head>
<body class="min-h-screen">

    <nav class="sticky-header bg-white border-b p-3 shadow-md no-print">
        <div class="max-w-7xl mx-auto flex justify-between items-center">
            <div class="font-black text-blue-600 text-lg">Paul的分帳神器</div>
            <div class="flex items-center gap-2">
                <select id="tripDropdown" onchange="switchTrip(this.value)" class="bg-gray-100 rounded-lg px-3 py-1.5 text-sm font-bold outline-none border-none"></select>
                <button onclick="createNewTrip()" class="text-blue-600 hover:scale-110"><i class="fa-solid fa-plus-circle text-2xl"></i></button>
            </div>
        </div>
    </nav>

    <header class="sticky-header bg-slate-900 text-white p-6 shadow-lg no-print" style="top: 60px;">
        <div class="max-w-7xl mx-auto flex justify-between items-center">
            <div>
                <h1 id="tripTitle" contenteditable="true" onblur="updateTripName()" class="text-2xl font-black p-1 rounded hover:bg-white/10">載入中...</h1>
                <p class="text-[10px] text-white/50 mt-1">
                    <i class="fa-brands fa-google mr-1"></i>匯率基準：Google Finance (0.20) 
                    <a href="https://www.google.com/search?q=JPY+to+TWD" target="_blank" class="text-blue-400 underline ml-1 font-bold">點此查詢最新</a>
                </p>
            </div>
            <div class="flex items-center gap-4">
                <button onclick="toggleTools()" class="bg-white/20 px-4 py-2 rounded-xl text-xs font-bold border border-white/20 hover:bg-white/30 transition-colors">工具與風格歷史 (A)</button>
            </div>
        </div>
        <div id="toolPanel" class="max-w-7xl mx-auto collapsible-content mt-4 space-y-4">
            <div class="bg-white/10 p-4 rounded-2xl flex flex-wrap items-center gap-6">
                <div class="flex gap-3 items-center border-r border-white/10 pr-6">
                    <span class="text-[10px] font-bold text-white/40 uppercase">切換風格</span>
                    <button onclick="changeTheme('classic')" class="w-6 h-6 rounded-full bg-blue-500 border-2 border-white" title="經典"></button>
                    <button onclick="changeTheme('spring')" class="w-6 h-6 rounded-full bg-emerald-500" title="春分"></button>
                    <button onclick="changeTheme('summer')" class="w-6 h-6 rounded-full bg-amber-400" title="盛夏"></button>
                    <button onclick="changeTheme('autumn')" class="w-6 h-6 rounded-full bg-red-500" title="楓秋"></button>
                    <button onclick="changeTheme('winter')" class="w-6 h-6 rounded-full bg-indigo-500" title="冬雪"></button>
                </div>
                <div class="flex flex-wrap gap-3">
                    <button onclick="exportToCSV()" class="bg-green-600 px-4 py-1.5 rounded-lg text-xs font-bold hover:bg-green-500">匯出 CSV</button>
                    <button onclick="window.print()" class="bg-blue-600 px-4 py-1.5 rounded-lg text-xs font-bold hover:bg-blue-500">列印報表</button>
                    <button onclick="deleteTripBtn()" class="bg-red-500/80 px-4 py-1.5 rounded-lg text-xs font-bold hover:bg-red-600">刪除專案</button>
                </div>
            </div>
            <div class="bg-white/5 rounded-2xl overflow-hidden">
                <p class="p-3 text-[10px] font-bold text-white/40 border-b border-white/10 uppercase">編輯歷史紀錄 (可還原)</p>
                <div id="historyList" class="max-h-40 overflow-y-auto"></div>
            </div>
        </div>
    </header>

    <main class="max-w-7xl mx-auto px-4 py-8 grid grid-cols-1 lg:grid-cols-4 gap-6">
        <div class="lg:col-span-1 space-y-6 no-print">
            <div class="card border-t-4 border-blue-500">
                <h3 class="font-bold mb-4 text-sm"><i class="fa-solid fa-plus mr-2"></i>新增消費</h3>
                <div class="mb-3">
                    <label class="text-[10px] font-bold text-gray-400">消費類別</label>
                    <select id="category" class="w-full border p-2.5 rounded-xl mt-1 text-sm bg-gray-50">
                        <option value="餐飲">🍽️ 餐飲</option><option value="購物">🛍️ 購物</option>
                        <option value="娛樂">🎡 娛樂</option><option value="住宿">🏨 住宿</option>
                        <option value="交通">🚗 交通</option><option value="其它">📦 其它</option>
                    </select>
                </div>
                <input id="itemName" type="text" placeholder="項目名稱" class="w-full border p-3 rounded-xl mb-3 text-sm outline-none">
                <div class="mb-3">
                    <div class="flex border rounded-xl overflow-hidden">
                        <select id="currency" onchange="checkNewCurrency(this)" class="bg-gray-50 px-3 text-xs font-bold border-r">
                            <option value="TWD" data-rate="1">TWD</option>
                            <option value="JPY" data-rate="0.2">JPY</option>
                            <option value="NEW">+ 新增外幣</option>
                        </select>
                        <input id="amount" type="number" placeholder="金額" class="flex-1 p-3 outline-none font-bold text-sm">
                    </div>
                    <p id="rateDisplay" class="text-[9px] text-gray-400 mt-1 ml-1 font-bold">目前匯率: 1.00</p>
                </div>
                <div class="mb-4">
                    <label class="text-[10px] font-bold text-gray-400">付款人</label>
                    <select id="payer" class="w-full border p-2.5 rounded-xl mt-1 font-bold text-sm"></select>
                </div>
                <div class="mb-6">
                    <div class="flex justify-between items-center mb-2">
                        <label class="text-[10px] font-bold text-gray-400">參與人員 (勾選)</label>
                        <button onclick="toggleSplitMode()" id="splitModeBtn" class="text-[9px] font-bold text-blue-500 underline">切換：手動指定金額</button>
                    </div>
                    <div id="memberCheckGrid" class="grid grid-cols-1 gap-2"></div>
                </div>
                <button onclick="addRow()" class="w-full py-4 rounded-2xl text-white font-black text-sm shadow-lg active:scale-95" style="background-color: var(--primary-color);">加入清單</button>
            </div>
        </div>

        <div class="lg:col-span-3 space-y-6">
            <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
                <div class="card flex flex-col md:flex-row items-center gap-6 bg-slate-800 text-white overflow-hidden">
                    <div class="flex-1">
                        <p class="text-white/50 font-bold text-xs uppercase tracking-widest">總支出 (TWD)</p>
                        <p id="totalSpent" class="text-4xl font-black mt-2 tracking-tighter">$0</p>
                        <div id="categoryBreakdown" class="mt-4 space-y-1"></div>
                    </div>
                    <div class="w-48 h-48">
                        <canvas id="expenseChart"></canvas>
                    </div>
                </div>
            </div>

            <div class="card p-0 overflow-hidden">
                <div class="overflow-x-auto">
                    <table class="w-full text-left">
                        <thead class="bg-gray-50 border-b text-[10px] font-black text-gray-400 uppercase tracking-widest">
                            <tr id="dynamicHeader"></tr>
                        </thead>
                        <tbody id="expenseList" class="text-xs divide-y"></tbody>
                    </table>
                </div>
            </div>

            <div class="card">
                <h3 class="font-bold mb-4 text-sm">💰 個人收支統計</h3>
                <div id="balanceSummaryList" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-4"></div>
            </div>

            <div class="card border-2 border-dashed border-blue-200 bg-blue-50/30">
                <h3 class="font-black mb-4 text-sm text-blue-600"><i class="fa-solid fa-paper-plane mr-2"></i>最終分帳轉帳建議</h3>
                <div id="settlementAdvice" class="grid grid-cols-1 md:grid-cols-2 gap-3"></div>
            </div>
        </div>
    </main>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getFirestore, doc, onSnapshot, setDoc } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

        const firebaseConfig = { apiKey: "AIzaSyCLz4iTnKXkba26S4fRUdV6d0DTZiRXSg0", authDomain: "travel-expense-7dbaa.firebaseapp.com", projectId: "travel-expense-7dbaa", storageBucket: "travel-expense-7dbaa.firebasestorage.app", messagingSenderId: "745263115640", appId: "1:745263115640:web:5714e2c1d041969ecaec8d" };
        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);
        const tripsRef = doc(db, "travelData", "master_record");
        const AVATARS = ['https://cdn-icons-png.flaticon.com/512/3135/3135715.png', 'https://cdn-icons-png.flaticon.com/512/3135/3135768.png', 'https://cdn-icons-png.flaticon.com/512/194/194938.png', 'https://cdn-icons-png.flaticon.com/512/4140/4140048.png'];

        window.trips = [];
        window.currentTripId = localStorage.getItem('current_trip_id') || "";
        let chartInstance = null;
        let isCustomSplit = false;

        const fmt = (num) => Math.round(num).toLocaleString('en-US');

        onSnapshot(tripsRef, (docSnap) => {
            if (docSnap.exists()) {
                window.trips = docSnap.data().trips || [];
                if (!window.currentTripId && window.trips.length > 0) window.currentTripId = window.trips[0].id;
                refreshAll();
            }
        });

        window.refreshAll = () => {
            const trip = window.trips.find(t => String(t.id) === String(window.currentTripId));
            if (!trip) return;

            document.getElementById('tripTitle').innerText = trip.name;
            document.getElementById('tripDropdown').innerHTML = window.trips.map(t => `<option value="${t.id}" ${String(t.id) === String(window.currentTripId) ? 'selected' : ''}>${t.name}</option>`).join('');
            
            if (!trip.members) trip.members = [{name: 'Paul', photo: AVATARS[0]}];
            document.getElementById('payer').innerHTML = trip.members.map(m => `<option value="${m.name}">${m.name}</option>`).join('');
            
            renderMemberGrid(trip);

            let headerHtml = `<th class="p-4">類別 / 項目</th><th class="p-4">付款人</th><th class="p-4">總額</th>`;
            trip.members.forEach(m => headerHtml += `<th class="p-4 text-center">${m.name}</th>`);
            headerHtml += `<th class="p-4 text-center">刪除</th>`;
            document.getElementById('dynamicHeader').innerHTML = headerHtml;

            let totalTWD = 0; 
            let balances = {};
            let paidSum = {};
            let oweSum = {};
            let catStats = { '餐飲':0, '購物':0, '娛樂':0, '住宿':0, '交通':0, '其它':0 };
            trip.members.forEach(m => { balances[m.name] = 0; paidSum[m.name] = 0; oweSum[m.name] = 0; });

            document.getElementById('expenseList').innerHTML = (trip.data || []).map(item => {
                totalTWD += item.amount;
                paidSum[item.payer] += item.amount;
                catStats[item.category || '其它'] += item.amount;
                
                let memberCells = trip.members.map(m => {
                    let cost = 0;
                    if (item.customAmounts && item.customAmounts[m.name] !== undefined) {
                        cost = item.customAmounts[m.name];
                    } else if (item.participants.includes(m.name)) {
                        cost = item.amount / item.participants.length;
                    }
                    if (cost > 0) {
                        balances[item.payer] += cost;
                        balances[m.name] -= cost;
                        oweSum[m.name] += cost;
                    }
                    return `<td class="p-4 text-center ${cost > 0 ? 'text-blue-600 font-bold' : 'text-gray-200'}">${cost > 0 ? Math.round(cost) : '-'}</td>`;
                }).join('');

                return `<tr>
                    <td class="p-4"><div class="flex items-center gap-2"><span>${getIcon(item.category)}</span><div><div class="font-bold">${item.name}</div><div class="text-[9px] text-gray-400">${item.date} ${item.rateInfo || ''}</div></div></div></td>
                    <td class="p-4 text-gray-500">${item.payer}</td>
                    <td class="p-4 font-black text-blue-600">$${fmt(item.amount)}</td>
                    ${memberCells}
                    <td class="p-4 text-center"><i onclick="deleteExpense(${item.id})" class="fa-solid fa-trash-can text-red-200 hover:text-red-500 cursor-pointer"></i></td>
                </tr>`;
            }).join('');

            document.getElementById('totalSpent').innerText = `$${fmt(totalTWD)}`;
            
            document.getElementById('balanceSummaryList').innerHTML = trip.members.map(m => `
                <div class="bg-gray-50 p-3 rounded-2xl border border-gray-100">
                    <div class="flex justify-between items-center mb-1">
                        <span class="font-black text-xs text-slate-700">${m.name}</span>
                        <span class="text-[10px] font-bold ${balances[m.name] >= 0 ? 'text-green-600' : 'text-red-600'}">差額: ${balances[m.name] >= 0 ? '+' : ''}${fmt(balances[m.name])}</span>
                    </div>
                    <div class="flex justify-between text-[10px]">
                        <span class="text-gray-400">總代付: <b class="text-emerald-500">$${fmt(paidSum[m.name])}</b></span>
                        <span class="text-gray-400">總應付: <b class="text-rose-400">$${fmt(oweSum[m.name])}</b></span>
                    </div>
                </div>`).join('');

            document.getElementById('historyList').innerHTML = (trip.history || []).map((h, i) => `
                <div class="history-item">
                    <span><b>${h.time}</b> - ${h.action}</span>
                    <button onclick="restoreHistory(${i})" class="bg-blue-600 text-white px-3 py-1 rounded-lg font-bold">復原此版本</button>
                </div>`).join('');

            updateChart(catStats);
            calculateAdvice(balances);
        };

        // (1) 修復匯出 CSV 檔案
        window.exportToCSV = () => {
            const trip = window.trips.find(t => String(t.id) === String(window.currentTripId));
            if (!trip || !trip.data.length) return alert("尚無消費資料可匯出");

            let csvContent = "\ufeff日期,項目,類別,付款人,台幣金額,參與人員\n";
            trip.data.forEach(item => {
                const row = [
                    item.date,
                    item.name,
                    item.category,
                    item.payer,
                    item.amount,
                    item.participants.join(";")
                ].join(",");
                csvContent += row + "\n";
            });

            const blob = new Blob([csvContent], { type: 'text/csv;charset=utf-8;' });
            const link = document.createElement("a");
            const url = URL.createObjectURL(blob);
            link.setAttribute("href", url);
            link.setAttribute("download", `${trip.name}_消費明細.csv`);
            link.style.visibility = 'hidden';
            document.body.appendChild(link);
            link.click();
            document.body.removeChild(link);
        };

        // (2) 修復刪除專案按鈕
        window.deleteTripBtn = async () => {
            if (window.trips.length <= 1) return alert("必須保留至少一個專案，無法刪除。");
            const trip = window.trips.find(t => String(t.id) === String(window.currentTripId));
            if (!confirm(`確定要「永久刪除」專案：${trip.name} 嗎？此操作無法還原。`)) return;

            window.trips = window.trips.filter(t => String(t.id) !== String(window.currentTripId));
            window.currentTripId = window.trips[0].id;
            localStorage.setItem('current_trip_id', window.currentTripId);
            
            await setDoc(tripsRef, { trips: window.trips });
            alert("專案已刪除");
        };

        window.renderMemberGrid = (trip) => {
            const amount = parseFloat(document.getElementById('amount').value) || 0;
            const rate = parseFloat(document.getElementById('currency').options[document.getElementById('currency').selectedIndex]?.dataset.rate) || 1;
            const totalTWD = amount * rate;
            const checkedCount = document.querySelectorAll('.participant-checkbox:checked').length || trip.members.length;
            const avg = totalTWD / checkedCount;

            document.getElementById('memberCheckGrid').innerHTML = trip.members.map(m => `
                <div class="flex items-center gap-3 p-2 bg-gray-50 rounded-xl border border-gray-100">
                    <img src="${m.photo || AVATARS[0]}" class="avatar">
                    <span class="text-xs font-bold flex-1">${m.name}</span>
                    ${isCustomSplit ? 
                        `<input type="number" placeholder="金額" class="custom-val w-16 bg-white border rounded p-1 text-[10px] font-bold" oninput="updateLiveShares()">` : 
                        `<span class="text-[10px] text-blue-500 font-bold individual-share">~$${fmt(avg)}</span>`
                    }
                    <input type="checkbox" value="${m.name}" checked class="participant-checkbox w-4 h-4" onchange="updateLiveShares()">
                </div>`).join('');
        };

        window.updateLiveShares = () => {
            if (isCustomSplit) return;
            const amount = parseFloat(document.getElementById('amount').value) || 0;
            const rate = parseFloat(document.getElementById('currency').options[document.getElementById('currency').selectedIndex]?.dataset.rate) || 1;
            const totalTWD = amount * rate;
            const cbs = document.querySelectorAll('.participant-checkbox:checked');
            const avg = cbs.length > 0 ? totalTWD / cbs.length : 0;
            document.querySelectorAll('.individual-share').forEach(el => el.innerText = `~$${fmt(avg)}`);
        };

        window.checkNewCurrency = (el) => {
            if (el.value === 'NEW') {
                const n = prompt("輸入外幣名稱 (如: USD):");
                const r = prompt("輸入匯率 (1 外幣 = ? 台幣):");
                if (n && r) {
                    const opt = document.createElement('option');
                    opt.value = n; opt.text = n; opt.dataset.rate = r;
                    el.add(opt, el.options[el.options.length - 1]);
                    el.value = n;
                } else el.value = 'TWD';
            }
            document.getElementById('rateDisplay').innerText = `目前匯率: ${parseFloat(el.options[el.selectedIndex].dataset.rate).toFixed(2)}`;
            updateLiveShares();
        };

        window.changeTheme = (t) => {
            document.body.className = `min-h-screen theme-${t}`;
            localStorage.setItem('user-theme', t);
        };

        Chart.register(ChartDataLabels);
        function updateChart(stats) {
            const ctx = document.getElementById('expenseChart').getContext('2d');
            const data = Object.values(stats).filter(v => v > 0);
            const labels = Object.keys(stats).filter(k => stats[k] > 0);
            if (chartInstance) chartInstance.destroy();
            chartInstance = new Chart(ctx, {
                type: 'doughnut',
                data: {
                    labels: labels,
                    datasets: [{
                        data: data,
                        backgroundColor: ['#f87171', '#fbbf24', '#34d399', '#60a5fa', '#a78bfa', '#94a3b8'],
                        borderWidth: 2, borderColor: '#1e293b'
                    }]
                },
                options: {
                    responsive: true,
                    maintainAspectRatio: false,
                    plugins: {
                        legend: { display: false },
                        datalabels: {
                            color: '#fff',
                            font: { weight: 'bold', size: 10 },
                            formatter: (value, ctx) => ctx.chart.data.labels[ctx.dataIndex] + '\n$' + fmt(value),
                            display: true
                        }
                    },
                    cutout: '40%'
                }
            });
        }

        window.addRow = async () => {
            const name = document.getElementById('itemName').value;
            let rawAmount = parseFloat(document.getElementById('amount').value);
            const sel = document.getElementById('currency');
            const rate = parseFloat(sel.options[sel.selectedIndex].dataset.rate);
            const cat = document.getElementById('category').value;
            const payer = document.getElementById('payer').value;

            if (!name || isNaN(rawAmount)) return alert("請填寫正確項目與金額");

            const amount = rawAmount * rate;
            const trip = window.trips.find(t => String(t.id) === String(window.currentTripId));
            
            let customSplit = null;
            let parts = [];
            if (isCustomSplit) {
                customSplit = {};
                const inputs = document.querySelectorAll('.custom-val');
                const checkboxes = document.querySelectorAll('.participant-checkbox');
                checkboxes.forEach((cb, idx) => {
                    if (cb.checked) {
                        const val = parseFloat(inputs[idx].value) || 0;
                        customSplit[cb.value] = val;
                        parts.push(cb.value);
                    }
                });
            } else {
                parts = Array.from(document.querySelectorAll('.participant-checkbox:checked')).map(cb => cb.value);
            }

            if (parts.length === 0) return alert("請至少選擇一位參與者");

            if (!trip.history) trip.history = [];
            trip.history.unshift({ 
                time: new Date().toLocaleTimeString(), 
                action: `新增項目: ${name}`, 
                data: JSON.parse(JSON.stringify(trip.data)), 
                members: JSON.parse(JSON.stringify(trip.members)) 
            });
            if (trip.history.length > 15) trip.history.pop();

            trip.data.unshift({ 
                id: Date.now(), name, amount, category: cat, payer, 
                participants: parts, 
                customAmounts: customSplit,
                date: new Date().toLocaleDateString(),
                rateInfo: sel.value !== 'TWD' ? `(${sel.value} x ${rate})` : ""
            });

            await setDoc(tripsRef, { trips: window.trips });
            document.getElementById('itemName').value = ''; 
            document.getElementById('amount').value = '';
        };

        window.toggleSplitMode = () => {
            isCustomSplit = !isCustomSplit;
            document.getElementById('splitModeBtn').innerText = isCustomSplit ? "切換：平均分攤模式" : "切換：手動指定金額";
            const trip = window.trips.find(t => String(t.id) === String(window.currentTripId));
            renderMemberGrid(trip);
        };

        window.deleteExpense = async (id) => {
            if (!confirm("確定刪除此筆消費？")) return;
            const trip = window.trips.find(t => String(t.id) === String(window.currentTripId));
            trip.data = trip.data.filter(d => d.id !== id);
            await setDoc(tripsRef, { trips: window.trips });
        };

        window.restoreHistory = async (i) => {
            const trip = window.trips.find(t => String(t.id) === String(window.currentTripId));
            const target = trip.history[i];
            trip.data = target.data;
            trip.members = target.members;
            await setDoc(tripsRef, { trips: window.trips });
        };

        function calculateAdvice(balances) {
            let debtors = [], creditors = [];
            for (let name in balances) {
                if (balances[name] < -1) debtors.push({ name, amt: Math.abs(balances[name]) });
                else if (balances[name] > 1) creditors.push({ name, amt: balances[name] });
            }
            let advice = [];
            while (debtors.length && creditors.length) {
                let d = debtors[0], c = creditors[0], settle = Math.min(d.amt, c.amt);
                advice.push(`<div class="flex items-center justify-between text-[11px] p-3 bg-white rounded-xl border border-blue-100 shadow-sm">
                    <span><b>${d.name}</b> <i class="fa-solid fa-arrow-right mx-2 text-blue-300"></i> <b>${c.name}</b></span>
                    <span class="font-black text-blue-600">$${fmt(settle)}</span>
                </div>`);
                d.amt -= settle; c.amt -= settle;
                if (d.amt <= 1) debtors.shift(); if (c.amt <= 1) creditors.shift();
            }
            document.getElementById('settlementAdvice').innerHTML = advice.length ? advice.join('') : '<p class="text-xs text-gray-400">目前帳目已平衡</p>';
        }

        function getIcon(cat) {
            const icons = { '餐飲': '🍽️', '購物': '🛍️', '娛樂': '🎡', '住宿': '🏨', '交通': '🚗', '其它': '📦' };
            return icons[cat] || '📦';
        }

        window.switchTrip = (id) => { window.currentTripId = id; localStorage.setItem('current_trip_id', id); refreshAll(); };
        window.toggleTools = () => document.getElementById('toolPanel').classList.toggle('expanded');
        document.getElementById('amount').addEventListener('input', updateLiveShares);
    </script>
</body>
</html>
