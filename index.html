<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Paul的分帳神器</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chartjs-plugin-datalabels@2"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style id="dynamic-theme">
        :root { --primary: #3b82f6; --bg: #f8fafc; }
        body { font-family: sans-serif; background-color: var(--bg); transition: all 0.5s ease; }
        .card { background: white; border-radius: 1.5rem; padding: 1.25rem; box-shadow: 0 4px 6px -1px rgba(0,0,0,0.1); }
        .avatar-choice { width: 45px; height: 45px; cursor: pointer; border-radius: 50%; transition: transform 0.2s; border: 2px solid transparent; }
        .avatar-choice:hover { transform: scale(1.1); border-color: var(--primary); }
        .history-row { border-bottom: 1px solid rgba(255,255,255,0.1); padding: 8px 0; }
        .modal { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.5); z-index: 100; align-items: center; justify-content: center; }
    </style>
</head>
<body>

    <div id="avatarModal" class="modal">
        <div class="bg-white p-6 rounded-3xl max-w-xs w-full shadow-2xl">
            <h3 class="font-bold mb-4 text-center">選擇頭像</h3>
            <div id="avatarGrid" class="grid grid-cols-5 gap-3 mb-6"></div>
            <button onclick="closeAvatarModal()" class="w-full py-2 bg-gray-100 rounded-xl font-bold text-sm">取消</button>
        </div>
    </div>

    <nav class="sticky top-0 z-50 bg-white border-b p-3 flex justify-between items-center shadow-sm">
        <div class="font-black text-blue-600 text-lg">Paul的分帳神器</div>
        <div class="flex items-center gap-2">
            <select id="tripDropdown" onchange="switchTrip(this.value)" class="bg-gray-100 rounded-lg px-3 py-1.5 text-sm font-bold"></select>
            <button onclick="createNewTrip()" class="text-blue-600 text-2xl"><i class="fa-solid fa-plus-circle"></i></button>
        </div>
    </nav>

    <header class="bg-slate-900 text-white p-6 relative">
        <div class="max-w-7xl mx-auto flex justify-between items-start">
            <div>
                <h1 id="tripTitle" class="text-2xl font-black">載入中...</h1>
                <p class="text-[10px] text-white/50 mt-1">
                    匯率基準：Google Finance (0.20) <a href="https://www.google.com/search?q=JPY+to+TWD" target="_blank" class="underline ml-1">點我查詢</a>
                </p>
            </div>
            <button onclick="toggleTools()" class="bg-white/10 px-4 py-2 rounded-xl text-xs font-bold border border-white/20">工具與歷史記錄</button>
        </div>

        <div id="toolPanel" class="max-w-7xl mx-auto overflow-hidden max-h-0 transition-all duration-300">
            <div class="pt-6 space-y-6">
                <div class="flex flex-wrap items-center gap-4 border-b border-white/10 pb-4">
                    <span class="text-xs font-bold text-white/40 uppercase">切換主題風格</span>
                    <div class="flex gap-2">
                        <button onclick="applyTheme('classic')" class="px-3 py-1 bg-blue-600 rounded-lg text-[10px] font-bold">經典</button>
                        <button onclick="applyTheme('spring')" class="px-3 py-1 bg-green-500 rounded-lg text-[10px] font-bold">春天</button>
                        <button onclick="applyTheme('summer')" class="px-3 py-1 bg-yellow-500 rounded-lg text-[10px] font-bold">夏日</button>
                        <button onclick="applyTheme('autumn')" class="px-3 py-1 bg-orange-500 rounded-lg text-[10px] font-bold">秋天</button>
                        <button onclick="applyTheme('winter')" class="px-3 py-1 bg-indigo-400 rounded-lg text-[10px] font-bold">冬天</button>
                    </div>
                </div>
                <div class="flex gap-2">
                    <button onclick="exportCSV()" class="bg-emerald-600 px-4 py-1.5 rounded-lg text-xs font-bold">匯出 CSV</button>
                    <button onclick="window.print()" class="bg-sky-600 px-4 py-1.5 rounded-lg text-xs font-bold">列印報表</button>
                    <button onclick="deleteTrip()" class="bg-rose-500 px-4 py-1.5 rounded-lg text-xs font-bold">刪除專案</button>
                </div>
                <div id="historyList" class="space-y-1 text-[11px] text-white/60 max-h-40 overflow-y-auto"></div>
            </div>
        </div>
    </header>

    <main class="max-w-7xl mx-auto px-4 py-8 grid grid-cols-1 lg:grid-cols-4 gap-6">
        <div class="lg:col-span-1 space-y-6">
            <div class="card border-t-4 border-blue-500">
                <h3 class="font-bold text-xs mb-4 uppercase tracking-tighter">新增消費項目</h3>
                <div class="space-y-3">
                    <select id="category" class="w-full border p-2.5 rounded-xl text-sm bg-gray-50">
                        <option value="餐飲">🍽️ 餐飲</option><option value="購物">🛍️ 購物</option>
                        <option value="娛樂">🎡 娛樂</option><option value="住宿">🏨 住宿</option>
                        <option value="交通">🚗 交通</option><option value="其它">📦 其它</option>
                    </select>
                    <input id="itemName" type="text" placeholder="項目名稱" class="w-full border p-3 rounded-xl text-sm">
                    
                    <div class="flex border rounded-xl overflow-hidden">
                        <select id="currency" onchange="checkNewCurrency(this)" class="bg-gray-100 px-3 text-[10px] font-bold border-r outline-none">
                            <option value="TWD" data-rate="1">TWD</option>
                            <option value="JPY" data-rate="0.2">JPY</option>
                            <option value="NEW">+ 新增</option>
                        </select>
                        <input id="amount" type="number" placeholder="金額" class="flex-1 p-3 font-bold text-sm">
                    </div>

                    <div>
                        <label class="text-[10px] font-bold text-gray-400">是誰付錢？</label>
                        <select id="payer" class="w-full border p-2.5 rounded-xl font-bold text-sm mt-1"></select>
                    </div>

                    <div>
                        <div class="flex justify-between items-center mb-1">
                            <label class="text-[10px] font-bold text-gray-400">參與成員</label>
                            <button onclick="addMember()" class="text-blue-500 text-[10px] font-bold">+ 新增成員</button>
                        </div>
                        <div id="memberCheckGrid" class="space-y-1"></div>
                    </div>
                    <button onclick="addExpense()" class="w-full py-4 rounded-2xl text-white font-black text-sm shadow-lg bg-blue-600 active:scale-95 transition-transform">加入帳目清單</button>
                </div>
            </div>
        </div>

        <div class="lg:col-span-3 space-y-6">
            <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
                <div class="card bg-slate-800 text-white flex items-center justify-between overflow-hidden">
                    <div class="z-10">
                        <p class="text-white/40 font-bold text-[10px] uppercase">總支出 (TWD)</p>
                        <p id="totalSpent" class="text-4xl font-black mt-1 tracking-tighter">$0</p>
                    </div>
                    <div class="w-36 h-36 relative">
                        <canvas id="expenseChart"></canvas>
                    </div>
                </div>
                <div class="card border-2 border-dashed border-blue-100">
                    <h3 class="font-bold text-xs mb-3 text-blue-600"><i class="fa-solid fa-paper-plane mr-2"></i>轉帳建議</h3>
                    <div id="settlementAdvice" class="space-y-2"></div>
                </div>
            </div>

            <div class="card p-0 overflow-hidden overflow-x-auto">
                <table class="w-full text-left min-w-[600px]">
                    <thead class="bg-gray-50 border-b text-[10px] font-black text-gray-400">
                        <tr id="dynamicHeader"></tr>
                    </thead>
                    <tbody id="expenseList" class="text-xs divide-y"></tbody>
                </table>
            </div>
        </div>
    </main>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getFirestore, doc, onSnapshot, setDoc } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

        const firebaseConfig = { apiKey: "AIzaSyCLz4iTnKXkba26S4fRUdV6d0DTZiRXSg0", authDomain: "travel-expense-7dbaa.firebaseapp.com", projectId: "travel-expense-7dbaa", storageBucket: "travel-expense-7dbaa.firebasestorage.app", messagingSenderId: "745263115640", appId: "1:745263115640:web:5714e2c1d041969ecaec8d" };
        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);
        const tripsRef = doc(db, "travelData", "master_record");

        // (5) 10種頭像圖示
        const AVATARS = [
            'https://cdn-icons-png.flaticon.com/512/4140/4140048.png', 'https://cdn-icons-png.flaticon.com/512/4140/4140047.png',
            'https://cdn-icons-png.flaticon.com/512/4140/4140051.png', 'https://cdn-icons-png.flaticon.com/512/4140/4140049.png',
            'https://cdn-icons-png.flaticon.com/512/1154/1154444.png', 'https://cdn-icons-png.flaticon.com/512/1154/1154460.png',
            'https://cdn-icons-png.flaticon.com/512/1154/1154474.png', 'https://cdn-icons-png.flaticon.com/512/1154/1154483.png',
            'https://cdn-icons-png.flaticon.com/512/1154/1154492.png', 'https://cdn-icons-png.flaticon.com/512/1154/1154452.png'
        ];

        window.trips = [];
        window.currentTripId = localStorage.getItem('current_trip_id') || "";
        let chartInstance = null;
        let activeMemberForAvatar = null;

        onSnapshot(tripsRef, (docSnap) => {
            if (docSnap.exists()) {
                window.trips = docSnap.data().trips || [];
                if (!window.currentTripId && window.trips.length > 0) window.currentTripId = window.trips[0].id;
                refreshAll();
            }
        });

        window.refreshAll = () => {
            const trip = window.trips.find(t => String(t.id) === String(window.currentTripId));
            if (!trip) return;

            document.getElementById('tripTitle').innerText = trip.name;
            document.getElementById('tripDropdown').innerHTML = window.trips.map(t => `<option value="${t.id}" ${String(t.id) === String(window.currentTripId) ? 'selected' : ''}>${t.name}</option>`).join('');

            // (5) 人名前方要有圖示
            document.getElementById('payer').innerHTML = trip.members.map(m => `<option value="${m.name}">${m.name}</option>`).join('');
            document.getElementById('memberCheckGrid').innerHTML = trip.members.map(m => `
                <div class="flex items-center gap-3 p-2 bg-gray-50 rounded-xl">
                    <img src="${m.photo || AVATARS[0]}" onclick="openAvatarModal('${m.name}')" class="w-6 h-6 rounded-full cursor-pointer hover:opacity-80">
                    <span class="text-[11px] font-bold flex-1">${m.name}</span>
                    <input type="checkbox" value="${m.name}" checked class="participant-checkbox w-4 h-4">
                </div>`).join('');

            // 表格渲染
            let headerHtml = `<th class="p-4">類別/項目</th><th class="p-4">付款人</th><th class="p-4 text-blue-600">金額(TWD)</th>`;
            trip.members.forEach(m => headerHtml += `<th class="p-4 text-center">${m.name}</th>`);
            headerHtml += `<th class="p-4"></th>`;
            document.getElementById('dynamicHeader').innerHTML = headerHtml;

            let total = 0; let balances = {}; let catStats = {};
            trip.members.forEach(m => balances[m.name] = 0);

            document.getElementById('expenseList').innerHTML = (trip.data || []).map(item => {
                total += item.amount;
                balances[item.payer] += item.amount;
                catStats[item.category] = (catStats[item.category] || 0) + item.amount;
                const share = item.amount / item.participants.length;

                let memberCells = trip.members.map(m => {
                    const isP = item.participants.includes(m.name);
                    if (isP) balances[m.name] -= share;
                    return `<td class="p-4 text-center">${isP ? `<b>✔️</b><br><span class="text-[9px] text-gray-400">$${Math.round(share).toLocaleString()}</span>` : '-'}</td>`;
                }).join('');

                return `<tr>
                    <td class="p-4">
                        <div class="font-bold">${item.category} | ${item.name}</div>
                        <div class="text-[9px] text-gray-400">${item.date} ${item.rateInfo || ''}</div>
                    </td>
                    <td class="p-4 font-bold text-gray-500">${item.payer}</td>
                    <td class="p-4 font-black text-blue-600">$${Math.round(item.amount).toLocaleString()}</td>
                    ${memberCells}
                    <td class="p-4 text-center">
                        <i onclick="deleteRow(${item.id})" class="fa-solid fa-trash-can text-red-200 hover:text-red-500 cursor-pointer"></i>
                    </td>
                </tr>`;
            }).join('');

            document.getElementById('totalSpent').innerText = `$${Math.round(total).toLocaleString()}`;
            document.getElementById('historyList').innerHTML = (trip.history || []).map((h, i) => `
                <div class="history-row flex justify-between">
                    <span>${h.time} - ${h.action}</span>
                    <button onclick="restore(${i})" class="text-blue-400 font-bold hover:underline">還原</button>
                </div>`).join('');

            updateChart(catStats);
            calculateAdvice(balances);
        };

        // (6) 轉帳建議精準邏輯
        function calculateAdvice(balances) {
            let d = [], c = [];
            for (let k in balances) {
                if (balances[k] < -1) d.push({n: k, v: Math.abs(balances[k])});
                if (balances[k] > 1) c.push({n: k, v: balances[k]});
            }
            let res = [];
            while (d.length && c.length) {
                let amt = Math.min(d[0].v, c[0].v);
                res.push(`<div class="flex justify-between items-center bg-blue-50/50 p-2 rounded-lg text-[10px]">
                    <span><b>${d[0].n}</b> → <b>${c[0].n}</b></span>
                    <span class="font-black text-blue-600">$${Math.round(amt).toLocaleString()}</span>
                </div>`);
                d[0].v -= amt; c[0].v -= amt;
                if (d[0].v < 1) d.shift(); if (c[0].v < 1) c.shift();
            }
            document.getElementById('settlementAdvice').innerHTML = res.length ? res.join('') : '<span class="text-gray-400 text-[10px]">已結清</span>';
        }

        // (3) 刪除整列項目
        window.deleteRow = async (id) => {
            if (!confirm("確定要刪除此筆帳目嗎？")) return;
            const trip = window.trips.find(t => String(t.id) === String(window.currentTripId));
            trip.history.unshift({ time: new Date().toLocaleTimeString(), action: `刪除帳目`, data: JSON.parse(JSON.stringify(trip.data)) });
            trip.data = trip.data.filter(i => i.id !== id);
            await setDoc(tripsRef, { trips: window.trips });
        };

        // (4) 新增外幣幣別
        window.checkNewCurrency = (el) => {
            if (el.value === 'NEW') {
                const name = prompt("請輸入幣別名稱 (例如: USD):");
                const rate = prompt("請輸入對台幣匯率 (1個外幣 = ? 台幣):");
                if (name && rate) {
                    const opt = document.createElement('option');
                    opt.value = name; opt.text = name; opt.dataset.rate = rate;
                    el.add(opt, el.options[el.options.length - 1]);
                    el.value = name;
                } else el.value = 'TWD';
            }
        };

        // (5) 頭像選擇彈窗邏輯
        window.openAvatarModal = (memberName) => {
            activeMemberForAvatar = memberName;
            const grid = document.getElementById('avatarGrid');
            grid.innerHTML = AVATARS.map(url => `<img src="${url}" class="avatar-choice" onclick="selectAvatar('${url}')">`).join('');
            document.getElementById('avatarModal').style.display = 'flex';
        };

        window.selectAvatar = async (url) => {
            const trip = window.trips.find(t => String(t.id) === String(window.currentTripId));
            const member = trip.members.find(m => m.name === activeMemberForAvatar);
            member.photo = url;
            await setDoc(tripsRef, { trips: window.trips });
            closeAvatarModal();
        };

        window.closeAvatarModal = () => document.getElementById('avatarModal').style.display = 'none';

        // (1) & (2) 主題切換
        window.applyTheme = (theme) => {
            const styles = document.getElementById('dynamic-theme');
            const body = document.body;
            if (theme === 'spring') {
                styles.innerHTML += ` :root { --primary: #10b981; --bg: #f0fdf4; } .card { border: 1px solid #d1fae5; }`;
            } else if (theme === 'winter') {
                styles.innerHTML += ` :root { --primary: #818cf8; --bg: #f5f3ff; } .card { border: 2px solid #e0e7ff; }`;
            } else if (theme === 'classic') {
                styles.innerHTML = styles.innerHTML.split(' :root')[0]; // Reset
            }
            // 更多風格細節可依此類推
        };

        // 基礎控制
        window.toggleTools = () => {
            const p = document.getElementById('toolPanel');
            p.style.maxHeight = p.style.maxHeight === '0px' ? '800px' : '0px';
        };

        window.addExpense = async () => {
            const name = document.getElementById('itemName').value;
            const amt = parseFloat(document.getElementById('amount').value);
            if (!name || isNaN(amt)) return alert("請填寫項目與金額");
            
            const sel = document.getElementById('currency');
            const rate = parseFloat(sel.options[sel.selectedIndex].dataset.rate);
            const currName = sel.value;
            const realAmt = amt * rate;

            const trip = window.trips.find(t => String(t.id) === String(window.currentTripId));
            trip.data.unshift({
                id: Date.now(),
                name,
                category: document.getElementById('category').value,
                amount: realAmt,
                payer: document.getElementById('payer').value,
                participants: Array.from(document.querySelectorAll('.participant-checkbox:checked')).map(c => c.value),
                date: new Date().toLocaleDateString(),
                rateInfo: currName !== 'TWD' ? `(${currName} ${amt} * ${rate})` : ""
            });
            await setDoc(tripsRef, { trips: window.trips });
            document.getElementById('itemName').value = ""; document.getElementById('amount').value = "";
        };

        function updateChart(stats) {
            const ctx = document.getElementById('expenseChart').getContext('2d');
            if (chartInstance) chartInstance.destroy();
            chartInstance = new Chart(ctx, {
                type: 'doughnut',
                data: {
                    labels: Object.keys(stats),
                    datasets: [{
                        data: Object.values(stats),
                        backgroundColor: ['#f87171', '#fbbf24', '#34d399', '#60a5fa', '#a78bfa', '#94a3b8'],
                        borderWidth: 0
                    }]
                },
                plugins: [ChartDataLabels],
                options: {
                    plugins: {
                        legend: { display: false },
                        datalabels: { color: '#fff', font: { weight: 'bold', size: 9 }, formatter: (v, c) => c.chart.data.labels[c.dataIndex] + '\n' + Math.round(v).toLocaleString() }
                    },
                    cutout: '70%'
                }
            });
        }

        window.switchTrip = (id) => { window.currentTripId = id; localStorage.setItem('current_trip_id', id); refreshAll(); };
    </script>
</body>
</html>
