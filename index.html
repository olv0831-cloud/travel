<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Paul的分帳神器</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chartjs-plugin-datalabels@2"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style id="dynamic-theme">
        :root { --primary: #3b82f6; --bg: #f8fafc; --card-radius: 1.5rem; }
        body { font-family: "PingFang TC", "Microsoft JhengHei", sans-serif; background-color: var(--bg); transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1); }
        .card { background: white; border-radius: var(--card-radius); transition: all 0.3s ease; }
        .sticky-nav { position: sticky; top: 0; z-index: 100; background: rgba(255,255,255,0.8); backdrop-filter: blur(12px); }
        .modal { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.6); z-index: 200; align-items: center; justify-content: center; backdrop-filter: blur(4px); }
        #toolPanel { transition: max-height 0.4s ease-in-out; overflow: hidden; }
        /* 活潑風格定義 */
        .theme-spring { --primary: #10b981; --bg: #f0fdf4; }
        .theme-spring .card { border: 2px solid #d1fae5; box-shadow: 8px 8px 0px #bbf7d0; }
        .theme-summer { --primary: #f59e0b; --bg: #fffbeb; }
        .theme-summer .card { border: 3px solid #fef3c7; border-radius: 3rem 1rem; transform: rotate(-1deg); }
        .theme-autumn { --primary: #ef4444; --bg: #fef2f2; }
        .theme-autumn .card { border-left: 10px solid #fee2e2; }
        .theme-winter { --primary: #6366f1; --bg: #eef2ff; }
        .theme-winter .card { border: 1px solid #e0e7ff; backdrop-filter: blur(20px); background: rgba(255,255,255,0.7); }
    </style>
</head>
<body class="pb-20">

    <nav class="sticky-nav p-4 flex justify-between items-center border-b">
        <div class="font-black text-blue-600 text-xl tracking-tighter">Paul的分帳神器</div>
        <div class="flex items-center gap-2">
            <select id="tripDropdown" onchange="switchTrip(this.value)" class="bg-gray-100 rounded-xl px-4 py-2 text-sm font-bold outline-none"></select>
            <button onclick="createNewTrip()" class="text-blue-600 text-3xl"><i class="fa-solid fa-plus-circle"></i></button>
        </div>
    </nav>

    <header class="bg-slate-900 text-white p-8">
        <div class="max-w-7xl mx-auto">
            <div class="flex justify-between items-start mb-6">
                <div class="flex-1">
                    <div class="group flex items-center gap-3">
                        <h1 id="tripTitle" onclick="renameTrip()" class="text-4xl font-black cursor-pointer hover:text-blue-400 transition-colors">載入中...</h1>
                        <i class="fa-solid fa-pen text-xs opacity-0 group-hover:opacity-50"></i>
                    </div>
                    <p class="text-[10px] text-white/40 mt-2 font-bold uppercase tracking-widest">Google Finance 實時匯率參考 (0.20)</p>
                </div>
                <div id="memberStatsHeader" class="flex gap-3 overflow-x-auto max-w-2xl pb-2"></div>
            </div>
            
            <div class="flex gap-3">
                <button onclick="toggleTools()" class="bg-white/10 hover:bg-white/20 px-6 py-2 rounded-2xl text-xs font-bold border border-white/20">工具與歷史</button>
                <div id="themeBtns" class="flex gap-2 ml-4 border-l border-white/10 pl-4">
                    <button onclick="applyTheme('classic')" class="w-6 h-6 rounded-full bg-blue-500 border-2 border-white"></button>
                    <button onclick="applyTheme('spring')" class="w-6 h-6 rounded-full bg-emerald-500"></button>
                    <button onclick="applyTheme('summer')" class="w-6 h-6 rounded-full bg-amber-400"></button>
                    <button onclick="applyTheme('autumn')" class="w-6 h-6 rounded-full bg-red-500"></button>
                    <button onclick="applyTheme('winter')" class="w-6 h-6 rounded-full bg-indigo-500"></button>
                </div>
            </div>

            <div id="toolPanel" style="max-height: 0px;">
                <div class="py-8 flex gap-3">
                    <button onclick="exportCSV()" class="bg-emerald-600 px-5 py-2 rounded-xl text-xs font-bold">匯出 CSV</button>
                    <button onclick="window.print()" class="bg-sky-600 px-5 py-2 rounded-xl text-xs font-bold">列印報表</button>
                    <button onclick="deleteTrip()" class="bg-rose-500 px-5 py-2 rounded-xl text-xs font-bold">刪除專案</button>
                </div>
                <div id="historyList" class="bg-black/20 rounded-3xl p-4 max-h-40 overflow-y-auto space-y-2"></div>
            </div>
        </div>
    </header>

    <main class="max-w-7xl mx-auto px-4 py-10 grid grid-cols-1 lg:grid-cols-4 gap-8">
        <div class="lg:col-span-1 space-y-6">
            <div class="card p-6 shadow-sm border border-gray-100">
                <h3 class="font-black text-xs text-gray-400 mb-6 uppercase">新增消費</h3>
                <div class="space-y-4">
                    <input id="itemName" type="text" placeholder="項目名稱" class="w-full border-2 p-3 rounded-2xl text-sm font-bold outline-none">
                    
                    <div class="flex border-2 rounded-2xl overflow-hidden focus-within:border-blue-500">
                        <select id="currency" class="bg-gray-50 px-3 text-[10px] font-black border-r outline-none">
                            <option value="TWD" data-rate="1">TWD</option>
                            <option value="JPY" data-rate="0.2">JPY</option>
                        </select>
                        <input id="amount" type="number" placeholder="金額" class="flex-1 p-3 font-black text-sm outline-none">
                    </div>

                    <div>
                        <label class="text-[10px] font-black text-gray-400 ml-1">誰付的錢？</label>
                        <select id="payer" class="w-full border-2 p-3 rounded-2xl font-black text-sm mt-1 bg-white"></select>
                    </div>

                    <div class="bg-gray-50 p-4 rounded-2xl">
                        <div class="flex justify-between items-center mb-3">
                            <label class="text-[10px] font-black text-gray-400">分帳成員與金額</label>
                            <button onclick="toggleSplitMode()" id="splitModeBtn" class="text-blue-600 text-[10px] font-black">切換：指定金額模式</button>
                        </div>
                        <div id="memberCheckGrid" class="space-y-3"></div>
                    </div>

                    <button onclick="addExpense()" class="w-full py-5 rounded-[1.5rem] text-white font-black text-sm shadow-xl bg-blue-600 hover:scale-[1.02] transition-all">加入帳目清單</button>
                </div>
            </div>
        </div>

        <div class="lg:col-span-3 space-y-8">
            <div class="card bg-slate-800 text-white p-8 flex items-center justify-between">
                <div>
                    <p class="text-white/30 font-black text-[10px] uppercase">Total Spent</p>
                    <p id="totalSpent" class="text-5xl font-black mt-2 tracking-tighter">$0</p>
                </div>
                <div class="w-40 h-40"><canvas id="expenseChart"></canvas></div>
            </div>

            <div class="card overflow-hidden shadow-xl border border-gray-100">
                <div class="overflow-x-auto">
                    <table class="w-full text-left border-collapse">
                        <thead class="bg-gray-50 text-[10px] font-black text-gray-400 uppercase">
                            <tr id="dynamicHeader"></tr>
                        </thead>
                        <tbody id="expenseList" class="text-xs divide-y"></tbody>
                    </table>
                </div>
            </div>

            <div class="card p-8 border-2 border-dashed border-gray-200">
                <h3 class="font-black text-sm mb-6 text-gray-800"><i class="fa-solid fa- money-bill-transfer mr-2"></i>最終轉帳建議</h3>
                <div id="settlementAdvice" class="grid grid-cols-1 md:grid-cols-2 gap-4"></div>
            </div>
        </div>
    </main>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getFirestore, doc, onSnapshot, setDoc } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

        const firebaseConfig = { apiKey: "AIzaSyCLz4iTnKXkba26S4fRUdV6d0DTZiRXSg0", authDomain: "travel-expense-7dbaa.firebaseapp.com", projectId: "travel-expense-7dbaa", storageBucket: "travel-expense-7dbaa.firebasestorage.app", messagingSenderId: "745263115640", appId: "1:745263115640:web:5714e2c1d041969ecaec8d" };
        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);
        const tripsRef = doc(db, "travelData", "master_record");

        window.trips = [];
        window.currentTripId = localStorage.getItem('current_trip_id') || "";
        let isCustomSplit = false; 

        onSnapshot(tripsRef, (docSnap) => {
            if (docSnap.exists()) {
                window.trips = docSnap.data().trips || [];
                if (!window.currentTripId && window.trips.length > 0) window.currentTripId = window.trips[0].id;
                refreshAll();
            }
        });

        window.refreshAll = () => {
            const trip = window.trips.find(t => String(t.id) === String(window.currentTripId));
            if (!trip) return;

            document.getElementById('tripTitle').innerText = trip.name;
            document.getElementById('tripDropdown').innerHTML = window.trips.map(t => `<option value="${t.id}" ${String(t.id) === String(window.currentTripId) ? 'selected' : ''}>${t.name}</option>`).join('');
            document.getElementById('payer').innerHTML = trip.members.map(m => `<option value="${m.name}">${m.name}</option>`).join('');

            // (2) 渲染分帳輸入框 (平分/指定金額)
            document.getElementById('memberCheckGrid').innerHTML = trip.members.map(m => `
                <div class="flex items-center gap-2">
                    <input type="checkbox" value="${m.name}" checked class="participant-checkbox w-4 h-4 rounded accent-blue-600">
                    <span class="text-xs font-bold flex-1">${m.name}</span>
                    <input type="number" placeholder="金額" class="custom-amount-input w-20 p-1 text-right text-[10px] border-b outline-none ${isCustomSplit ? '' : 'hidden'}">
                </div>`).join('');

            // 計算邏輯
            let sum = 0; let bals = {}; let paidSum = {}; let oweSum = {};
            trip.members.forEach(m => { bals[m.name] = 0; paidSum[m.name] = 0; oweSum[m.name] = 0; });

            const listHtml = (trip.data || []).map(item => {
                sum += item.amount;
                paidSum[item.payer] += item.amount;
                
                // 計算每個人在此筆應出的錢
                let detailHtml = trip.members.map(m => {
                    let cost = 0;
                    if (item.customAmounts && item.customAmounts[m.name] !== undefined) {
                        cost = item.customAmounts[m.name];
                    } else if (item.participants.includes(m.name)) {
                        cost = item.amount / item.participants.length;
                    }
                    bals[item.payer] += cost; // 代墊者收回
                    bals[m.name] -= cost;    // 消費者扣除
                    oweSum[m.name] += cost;
                    return `<td class="p-4 text-center ${cost > 0 ? 'font-black text-blue-500' : 'text-gray-200'}">${cost > 0 ? '$' + Math.round(cost) : '-'}</td>`;
                }).join('');

                return `<tr class="hover:bg-gray-50">
                    <td class="p-4 font-bold">${item.name}<br><span class="text-[9px] text-gray-400">${item.date}</span></td>
                    <td class="p-4">${item.payer}</td>
                    <td class="p-4 font-black">$${Math.round(item.amount).toLocaleString()}</td>
                    ${detailHtml}
                </tr>`;
            }).join('');

            document.getElementById('expenseList').innerHTML = listHtml;
            document.getElementById('totalSpent').innerText = `$${Math.round(sum).toLocaleString()}`;

            // (3) 右上角渲染：代墊(Paid) 與 應付(Owe)
            document.getElementById('memberStatsHeader').innerHTML = trip.members.map(m => `
                <div class="bg-white/10 p-3 rounded-2xl min-w-[120px] backdrop-blur-sm">
                    <p class="text-[10px] font-black text-blue-400">${m.name}</p>
                    <div class="flex justify-between mt-1">
                        <span class="text-[9px] opacity-50">代墊:</span>
                        <span class="text-[10px] font-bold text-emerald-400">$${Math.round(paidSum[m.name]).toLocaleString()}</span>
                    </div>
                    <div class="flex justify-between">
                        <span class="text-[9px] opacity-50">應付:</span>
                        <span class="text-[10px] font-bold text-rose-400">$${Math.round(oweSum[m.name]).toLocaleString()}</span>
                    </div>
                </div>`).join('');

            calcSettlement(bals);
            // 更新動態標頭
            let h = `<th class="p-4">項目</th><th class="p-4">付款人</th><th class="p-4">金額</th>`;
            trip.members.forEach(m => h += `<th class="p-4 text-center">${m.name}</th>`);
            document.getElementById('dynamicHeader').innerHTML = h;
        };

        // (1) 修改專案名稱
        window.renameTrip = async () => {
            const newName = prompt("請輸入新的專案名稱：");
            if (newName) {
                const trip = window.trips.find(t => String(t.id) === String(window.currentTripId));
                trip.name = newName;
                await setDoc(tripsRef, { trips: window.trips });
            }
        };

        // (2) 切換分帳模式
        window.toggleSplitMode = () => {
            isCustomSplit = !isCustomSplit;
            document.getElementById('splitModeBtn').innerText = isCustomSplit ? "切換：平均分攤模式" : "切換：指定金額模式";
            refreshAll();
        };

        // (5) 深度風格活潑化
        window.applyTheme = (t) => {
            document.body.className = t === 'classic' ? 'pb-20' : `pb-20 theme-${t}`;
            // 觸發重繪
            window.scrollTo(0, window.scrollY + 1);
        };

        window.addExpense = async () => {
            const n = document.getElementById('itemName').value;
            const a = parseFloat(document.getElementById('amount').value);
            if (!n || isNaN(a)) return alert("資料不完整");

            const trip = window.trips.find(x => String(x.id) === String(window.currentTripId));
            let customSplitData = {};
            if (isCustomSplit) {
                const inputs = document.querySelectorAll('.custom-amount-input');
                inputs.forEach((inp, idx) => {
                    if (inp.value) customSplitData[trip.members[idx].name] = parseFloat(inp.value);
                });
            }

            trip.data.unshift({
                id: Date.now(),
                name: n,
                amount: a * (document.getElementById('currency').value === 'JPY' ? 0.2 : 1),
                payer: document.getElementById('payer').value,
                participants: Array.from(document.querySelectorAll('.participant-checkbox:checked')).map(c => c.value),
                customAmounts: isCustomSplit ? customSplitData : null,
                date: new Date().toLocaleDateString()
            });
            await setDoc(tripsRef, { trips: window.trips });
            document.getElementById('itemName').value = ""; document.getElementById('amount').value = "";
        };

        function calcSettlement(b) {
            let d = [], c = [];
            for (let k in b) {
                if (b[k] < -1) d.push({n: k, v: Math.abs(b[k])});
                if (b[k] > 1) c.push({n: k, v: b[k]});
            }
            let res = [];
            while (d.length && c.length) {
                let a = Math.min(d[0].v, c[0].v);
                res.push(`<div class="bg-white p-4 rounded-3xl shadow-sm border flex justify-between items-center hover:scale-105 transition-transform">
                    <span class="font-black text-gray-700">${d[0].n} <i class="fa-solid fa-chevron-right mx-2 text-blue-200"></i> ${c[0].n}</span>
                    <span class="text-lg font-black text-blue-600">$${Math.round(a).toLocaleString()}</span>
                </div>`);
                d[0].v -= a; c[0].v -= a;
                if (d[0].v < 1) d.shift(); if (c[0].v < 1) c.shift();
            }
            document.getElementById('settlementAdvice').innerHTML = res.join('') || '<p class="col-span-2 text-center py-10 opacity-30 font-bold">目前無須轉帳，帳目非常完美</p>';
        }

        window.toggleTools = () => {
            const p = document.getElementById('toolPanel');
            p.style.maxHeight = p.style.maxHeight === '0px' ? '500px' : '0px';
        };

        window.switchTrip = (id) => { window.currentTripId = id; localStorage.setItem('current_trip_id', id); refreshAll(); };
    </script>
</body>
</html>
