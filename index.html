<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Paul的分帳神器-手動匯率版</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chartjs-plugin-datalabels@2"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        :root { --primary-color: #3b82f6; --bg-color: #f8fafc; --card-bg: #ffffff; --radius: 1.5rem; }
        body { background-color: var(--bg-color); color: #1e293b; font-family: sans-serif; }
        .card { background-color: var(--card-bg); border-radius: var(--radius); padding: 1.25rem; box-shadow: 0 4px 6px -1px rgba(0,0,0,0.1); border: 1px solid transparent; }
        .sticky-header { position: sticky; top: 0; z-index: 50; }
        .avatar { width: 32px; height: 32px; border-radius: 50%; border: 2px solid #fff; cursor: pointer; }
        .collapsible-content { max-height: 0; overflow: hidden; transition: max-height 0.3s ease-out; }
        .expanded { max-height: 2000px; }
        .history-item { display: flex; justify-content: space-between; align-items: center; padding: 10px; background: rgba(255,255,255,0.05); border-bottom: 1px solid rgba(255,255,255,0.1); font-size: 11px; }
        .currency-tag { display: flex; align-items: center; gap: 6px; background: #3b82f6; color: white; padding: 4px 10px; border-radius: 99px; font-size: 11px; font-weight: bold; }
        #avatarPicker { display: none; position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%); z-index: 100; background: white; padding: 20px; border-radius: 20px; box-shadow: 0 10px 25px rgba(0,0,0,0.2); }
    </style>
</head>
<body class="min-h-screen">

    <div id="avatarPicker">
        <div class="flex justify-between items-center mb-4"><h3 class="font-bold">選擇頭像</h3><button onclick="closeAvatarPicker()"><i class="fa-solid fa-times"></i></button></div>
        <div id="avatarGrid" class="grid grid-cols-5 gap-4"></div>
    </div>

    <nav class="sticky-header bg-white border-b p-3 shadow-sm">
        <div class="max-w-7xl mx-auto flex justify-between items-center">
            <div class="font-black text-blue-600 text-lg">Paul的分帳神器</div>
            <div class="flex items-center gap-2">
                <select id="tripDropdown" onchange="switchTrip(this.value)" class="bg-gray-100 rounded-lg px-3 py-1.5 text-sm font-bold"></select>
                <button onclick="createNewTrip()" class="text-blue-600"><i class="fa-solid fa-plus-circle text-2xl"></i></button>
            </div>
        </div>
    </nav>

    <header class="bg-slate-900 text-white p-6 shadow-lg">
        <div class="max-w-7xl mx-auto flex justify-between items-center">
            <div>
                <h1 id="tripTitle" contenteditable="true" onblur="updateTripName()" class="text-2xl font-black p-1 rounded hover:bg-white/10">載入中...</h1>
                <p class="text-[10px] text-white/50 mt-1"><i class="fa-solid fa-calculator mr-1"></i>匯率模式：手動管理 (點擊更新按鈕同步最新匯率)</p>
            </div>
            <button onclick="toggleTools()" class="bg-white/20 px-4 py-2 rounded-xl text-xs font-bold border border-white/20">工具與設定</button>
        </div>
        
        <div id="toolPanel" class="max-w-7xl mx-auto collapsible-content mt-4 space-y-4">
            <div class="bg-white/10 p-5 rounded-2xl border border-white/10">
                <div class="flex justify-between items-center mb-3">
                    <p class="text-[10px] font-bold text-blue-400 uppercase mb-3">💱 外幣匯率設定</p>
                    <button onclick="fetchOnlineRates()" class="bg-blue-600 hover:bg-blue-500 text-[10px] px-3 py-1 rounded font-bold shadow-lg">
                        <i class="fa-solid fa-rotate mr-1"></i>從網路更新即時匯率
                    </button>
                </div>
                <div class="flex flex-wrap gap-3 items-center mb-4">
                    <input id="newCurrencyCode" type="text" placeholder="幣別(如:USD)" class="bg-white/20 border-none rounded-lg px-3 py-2 text-sm w-32 text-white outline-none">
                    <input id="newCurrencyRate" type="number" step="0.0001" placeholder="匯率(對台幣)" class="bg-white/20 border-none rounded-lg px-3 py-2 text-sm w-32 text-white outline-none">
                    <button onclick="addNewCurrency()" class="bg-blue-500 px-4 py-2 rounded-lg text-sm font-bold hover:bg-blue-400">確認手動新增</button>
                </div>
                <div id="currencyList" class="flex flex-wrap gap-2"></div>
            </div>

            <div class="bg-white/10 p-5 rounded-2xl border border-white/10">
                <div class="flex justify-between items-center mb-3">
                    <p class="text-[10px] font-bold text-blue-400 uppercase">👥 人員名單</p>
                    <button onclick="addMember()" class="bg-blue-500 text-[10px] px-3 py-1 rounded">+ 新增人員</button>
                </div>
                <div id="memberManageList" class="flex flex-wrap gap-4"></div>
            </div>

            <div class="bg-black/20 rounded-2xl overflow-hidden">
                <p class="p-3 text-[10px] font-bold text-white/40 border-b border-white/5 uppercase">🕒 歷史版本 (點擊還原)</p>
                <div id="historyList" class="max-h-48 overflow-y-auto"></div>
            </div>
            
            <div class="flex justify-end gap-2">
                <button onclick="deleteTripBtn()" class="bg-red-500/80 px-4 py-2 rounded-xl text-xs font-bold">刪除此專案</button>
            </div>
        </div>
    </header>

    <main class="max-w-7xl mx-auto px-4 py-8">
        <div class="grid grid-cols-1 gap-6">
            <div class="card border-t-4 border-blue-500">
                <h3 class="font-bold text-sm mb-4">📝 新增消費項目</h3>
                <div class="grid grid-cols-1 md:grid-cols-4 gap-4 items-end">
                    <div class="space-y-1">
                        <label class="text-[10px] font-bold text-gray-400">品項名稱</label>
                        <input id="itemName" type="text" class="w-full border p-2.5 rounded-xl text-sm outline-none" placeholder="例如：晚餐">
                    </div>
                    <div class="space-y-1">
                        <label class="text-[10px] font-bold text-gray-400">金額與幣別</label>
                        <div class="flex border rounded-xl overflow-hidden">
                            <select id="currencySelect" class="bg-gray-50 px-2 text-xs font-bold border-r outline-none"></select>
                            <input id="amount" type="number" class="w-full p-2.5 outline-none font-bold text-sm" placeholder="0">
                        </div>
                    </div>
                    <div class="space-y-1">
                        <label class="text-[10px] font-bold text-gray-400">誰付錢的？</label>
                        <select id="payerSelect" class="w-full border p-2.5 rounded-xl text-sm font-bold outline-none"></select>
                    </div>
                    <button onclick="addExpenseRow()" class="bg-blue-600 text-white py-3 rounded-xl font-bold shadow-lg hover:bg-blue-500">加入帳單</button>
                </div>
                
                <div class="mt-6 border-t pt-4">
                    <label class="text-[10px] font-bold text-gray-400 block mb-3">這筆錢誰要分？</label>
                    <div id="memberCheckGrid" class="flex flex-wrap gap-3"></div>
                </div>
            </div>

            <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
                <div class="card bg-slate-800 text-white flex items-center justify-between">
                    <div>
                        <p class="text-white/50 font-bold text-xs uppercase tracking-widest">總支出 (TWD)</p>
                        <p id="totalSpent" class="text-4xl font-black mt-2">$0</p>
                    </div>
                    <div class="w-32 h-32"><canvas id="expenseChart"></canvas></div>
                </div>
                <div class="card">
                    <h3 class="font-bold mb-4 text-sm">💰 個人應收/應付</h3>
                    <div id="balanceList" class="grid grid-cols-1 gap-2"></div>
                </div>
            </div>

            <div class="card border-2 border-dashed border-blue-200 bg-blue-50/30">
                <h3 class="font-black mb-4 text-sm text-blue-600"><i class="fa-solid fa-paper-plane mr-2"></i>轉帳建議</h3>
                <div id="settlementAdvice" class="grid grid-cols-1 md:grid-cols-2 gap-3"></div>
            </div>

            <div class="card p-0 overflow-hidden">
                <div class="overflow-x-auto">
                    <table class="w-full text-left">
                        <thead class="bg-gray-50 border-b text-[10px] font-black text-gray-400 uppercase">
                            <tr id="tableHeader"></tr>
                        </thead>
                        <tbody id="expenseTable" class="text-xs divide-y"></tbody>
                    </table>
                </div>
            </div>
        </div>
    </main>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getFirestore, doc, onSnapshot, setDoc } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

        const firebaseConfig = { apiKey: "AIzaSyCLz4iTnKXkba26S4fRUdV6d0DTZiRXSg0", authDomain: "travel-expense-7dbaa.firebaseapp.com", projectId: "travel-expense-7dbaa", storageBucket: "travel-expense-7dbaa.firebasestorage.app", messagingSenderId: "745263115640", appId: "1:745263115640:web:5714e2c1d041969ecaec8d" };
        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);
        const docRef = doc(db, "travelData", "master_record");

        const AVATARS = [
            'https://cdn-icons-png.flaticon.com/512/3135/3135715.png', 'https://cdn-icons-png.flaticon.com/512/4140/4140048.png', 'https://cdn-icons-png.flaticon.com/512/1999/1999625.png', 'https://cdn-icons-png.flaticon.com/512/236/236831.png', 'https://cdn-icons-png.flaticon.com/512/4139/4139981.png',
            'https://cdn-icons-png.flaticon.com/512/3135/3135768.png', 'https://cdn-icons-png.flaticon.com/512/194/194938.png', 'https://cdn-icons-png.flaticon.com/512/6997/6997662.png', 'https://cdn-icons-png.flaticon.com/512/4140/4140047.png', 'https://cdn-icons-png.flaticon.com/512/1154/1154444.png'
        ];

        window.trips = [];
        window.currentTripId = localStorage.getItem('trip_id') || "";
        window.selectedMembers = [];
        let isSyncing = false; 
        let chartObj = null;

        document.getElementById('avatarGrid').innerHTML = AVATARS.map((url, i) => `<img src="${url}" class="w-12 h-12 rounded-full cursor-pointer hover:scale-110" onclick="selectAvatar(${i})">`).join('');

        onSnapshot(docRef, (snap) => {
            if (isSyncing) return;
            if (snap.exists()) {
                window.trips = snap.data().trips || [];
                if (!window.currentTripId && window.trips.length > 0) window.currentTripId = window.trips[0].id;
                render();
            }
        });

        async function save(actionName) {
            isSyncing = true;
            const trip = window.trips.find(t => String(t.id) === String(window.currentTripId));
            if (trip) {
                if (!trip.history) trip.history = [];
                const backup = {
                    time: new Date().toLocaleString(),
                    action: actionName,
                    data: JSON.parse(JSON.stringify(trip.data || [])),
                    members: JSON.parse(JSON.stringify(trip.members || [])),
                    currencies: JSON.parse(JSON.stringify(trip.customCurrencies || {}))
                };
                trip.history.unshift(backup);
                if (trip.history.length > 15) trip.history.pop();
            }
            await setDoc(docRef, { trips: window.trips });
            setTimeout(() => { isSyncing = false; }, 1000);
            render();
        }

        // --- 匯率與幣別功能修改點 ---

        window.addNewCurrency = async () => {
            const code = document.getElementById('newCurrencyCode').value.toUpperCase().trim();
            const rate = parseFloat(document.getElementById('newCurrencyRate').value);
            if (!code || isNaN(rate)) return alert("請輸入正確的幣別代碼與匯率(對台幣)");

            const trip = window.trips.find(t => String(t.id) === String(window.currentTripId));
            if (!trip.customCurrencies) trip.customCurrencies = {};
            
            trip.customCurrencies[code] = rate;
            document.getElementById('newCurrencyCode').value = "";
            document.getElementById('newCurrencyRate').value = "";
            
            await save(`新增幣別: ${code}`);
            alert(`已成功新增 ${code}，匯率為 ${rate}`);
        };

        window.deleteCurrency = async (code) => {
            if (!confirm(`確定要刪除 ${code} 幣別嗎？`)) return;
            const trip = window.trips.find(t => String(t.id) === String(window.currentTripId));
            if (trip.customCurrencies) {
                delete trip.customCurrencies[code];
                await save(`刪除幣別: ${code}`);
            }
        };

        window.fetchOnlineRates = async () => {
            const btn = event.currentTarget;
            const originalText = btn.innerHTML;
            btn.innerHTML = '<i class="fa-solid fa-spinner fa-spin mr-1"></i>抓取中...';
            try {
                // 使用公開匯率 API
                const res = await fetch('https://open.er-api.com/v6/latest/TWD');
                const data = await res.json();
                if (data && data.rates) {
                    const trip = window.trips.find(t => String(t.id) === String(window.currentTripId));
                    if (!trip.customCurrencies) trip.customCurrencies = {};
                    
                    // 定義要抓取的目標外幣
                    const targets = ['JPY', 'USD', 'EUR', 'KRW', 'HKD', 'CNY', 'THB', 'SGD'];
                    targets.forEach(code => {
                        if (data.rates[code]) {
                            // API 是 1 TWD = ? 外幣，所以要倒過來算 1 外幣 = ? TWD
                            trip.customCurrencies[code] = parseFloat((1 / data.rates[code]).toFixed(4));
                        }
                    });
                    
                    await save("網路更新匯率");
                    alert("熱門外幣匯率已成功同步！");
                }
            } catch (e) {
                alert("抓取失敗，請檢查網路連線或稍後再試。");
            } finally {
                btn.innerHTML = originalText;
            }
        };

        // --- 其餘渲染與計算邏輯 (保持不動) ---

        function render() {
            const trip = window.trips.find(t => String(t.id) === String(window.currentTripId));
            if (!trip) return;

            document.getElementById('tripTitle').innerText = trip.name;
            document.getElementById('tripDropdown').innerHTML = window.trips.map(t => `<option value="${t.id}" ${String(t.id) === String(window.currentTripId) ? 'selected' : ''}>${t.name}</option>`).join('');

            const curs = trip.customCurrencies || {};
            let curHtml = `<option value="TWD">TWD (1.0)</option>`;
            let curListHtml = "";
            Object.keys(curs).forEach(c => {
                curHtml += `<option value="${c}">${c} (${curs[c]})</option>`;
                curListHtml += `<div class="currency-tag">${c}: ${curs[c]} <i class="fa-solid fa-times cursor-pointer hover:text-red-200" onclick="deleteCurrency('${c}')"></i></div>`;
            });
            document.getElementById('currencySelect').innerHTML = curHtml;
            document.getElementById('currencyList').innerHTML = curListHtml || '<span class="text-white/20 text-xs">尚無幣別數據</span>';

            document.getElementById('payerSelect').innerHTML = trip.members.map(m => `<option value="${m.name}">${m.name}</option>`).join('');
            document.getElementById('memberManageList').innerHTML = trip.members.map((m, i) => `
                <div class="flex items-center gap-2 bg-white/10 p-2 rounded-xl">
                    <img src="${m.photo}" class="avatar" onclick="openAvatarPicker(${i})">
                    <span class="text-xs font-bold">${m.name}</span>
                </div>`).join('');
            
            if (window.selectedMembers.length === 0) window.selectedMembers = trip.members.map(m => m.name);
            document.getElementById('memberCheckGrid').innerHTML = trip.members.map(m => `
                <div class="flex items-center gap-2 bg-gray-50 px-3 py-2 rounded-xl border border-gray-200 cursor-pointer" onclick="toggleMember('${m.name}')">
                    <i class="fa-solid ${window.selectedMembers.includes(m.name) ? 'fa-circle-check text-blue-500' : 'fa-circle text-gray-300'}"></i>
                    <span class="text-xs font-bold">${m.name}</span>
                </div>`).join('');

            document.getElementById('historyList').innerHTML = (trip.history || []).map((h, i) => `
                <div class="history-item">
                    <div><b class="text-blue-400">${h.action}</b><br><span class="opacity-50">${h.time}</span></div>
                    <button onclick="restoreHistory(${i})" class="bg-blue-600 px-3 py-1 rounded">還原</button>
                </div>`).join('');

            calculate(trip);
        }

        function calculate(trip) {
            let total = 0;
            let balances = {};
            trip.members.forEach(m => balances[m.name] = 0);

            let tableHead = `<th class="p-4">項目</th><th class="p-4">付款人</th><th class="p-4">台幣</th>`;
            trip.members.forEach(m => tableHead += `<th class="p-4 text-center">${m.name}</th>`);
            tableHead += `<th class="p-4 text-center">刪</th>`;
            document.getElementById('tableHeader').innerHTML = tableHead;

            const rows = trip.data.map(d => {
                total += d.amount;
                balances[d.payer] += d.amount;
                const split = d.amount / d.participants.length;
                d.participants.forEach(p => { if(balances[p] !== undefined) balances[p] -= split; });

                let mCells = trip.members.map(m => {
                    const isPart = d.participants.includes(m.name);
                    return `<td class="p-4 text-center ${isPart ? 'text-blue-500 font-bold' : 'text-gray-200'}">${isPart ? Math.round(split) : '-'}</td>`;
                }).join('');

                return `<tr>
                    <td class="p-4"><b>${d.name}</b><br><span class="text-[9px] text-gray-400">${d.currency !== 'TWD' ? d.rawAmt + ' ' + d.currency : ''}</span></td>
                    <td class="p-4 text-gray-500">${d.payer}</td>
                    <td class="p-4 font-bold">$${Math.round(d.amount)}</td>
                    ${mCells}
                    <td class="p-4 text-center" onclick="deleteExpense(${d.id})"><i class="fa-solid fa-trash text-red-200 cursor-pointer"></i></td>
                </tr>`;
            }).join('');

            document.getElementById('expenseTable').innerHTML = rows;
            document.getElementById('totalSpent').innerText = `$${Math.round(total).toLocaleString()}`;
            
            document.getElementById('balanceList').innerHTML = trip.members.map(m => `
                <div class="flex justify-between items-center bg-gray-50 p-3 rounded-xl border border-gray-100">
                    <span class="font-bold text-xs">${m.name}</span>
                    <span class="font-black ${balances[m.name] >= 0 ? 'text-green-600' : 'text-red-600'}">${balances[m.name] >= 0 ? '應收 +' : '應付 '}${Math.round(Math.abs(balances[m.name]))}</span>
                </div>`).join('');

            updateChart(trip);
            renderAdvice(balances);
        }

        function renderAdvice(balances) {
            let p = [], r = [];
            Object.keys(balances).forEach(n => {
                if (balances[n] > 1) r.push({n, amt: balances[n]});
                else if (balances[n] < -1) p.push({n, amt: -balances[n]});
            });
            let advice = "";
            let i=0, j=0;
            while(i<p.length && j<r.length) {
                let m = Math.min(p[i].amt, r[j].amt);
                advice += `<div class="bg-white p-3 rounded-xl shadow-sm flex justify-between">
                    <span class="text-xs"><b>${p[i].n}</b> ➔ <b>${r[j].n}</b></span>
                    <b class="text-blue-600">$${Math.round(m)}</b>
                </div>`;
                p[i].amt -= m; r[j].amt -= m;
                if(p[i].amt < 1) i++; if(r[j].amt < 1) j++;
            }
            document.getElementById('settlementAdvice').innerHTML = advice || '<span class="text-xs text-gray-400">目前無須轉帳</span>';
        }

        function updateChart(trip) {
            const ctx = document.getElementById('expenseChart').getContext('2d');
            const dataMap = {};
            trip.data.forEach(d => { dataMap[d.payer] = (dataMap[d.payer] || 0) + d.amount; });
            if (chartObj) chartObj.destroy();
            chartObj = new Chart(ctx, {
                type: 'doughnut',
                data: { labels: Object.keys(dataMap), datasets: [{ data: Object.values(dataMap), backgroundColor: ['#3b82f6', '#10b981', '#f59e0b', '#ef4444', '#8b5cf6'] }] },
                options: { plugins: { legend: { display: false } }, cutout: '70%' }
            });
        }

        window.toggleMember = (name) => {
            if (window.selectedMembers.includes(name)) window.selectedMembers = window.selectedMembers.filter(n => n !== name);
            else window.selectedMembers.push(name);
            render();
        };

        window.toggleTools = () => document.getElementById('toolPanel').classList.toggle('expanded');
        window.updateTripName = async () => {
            const name = document.getElementById('tripTitle').innerText.trim();
            const trip = window.trips.find(t => String(t.id) === String(window.currentTripId));
            if (trip && name && trip.name !== name) { trip.name = name; await save("更名"); }
        };

        window.switchTrip = (id) => { window.currentTripId = id; localStorage.setItem('trip_id', id); render(); };

        window.createNewTrip = async () => {
            const n = prompt("輸入新專案名稱:");
            if (!n) return;
            const t = { id: Date.now(), name: n, members: [{name: 'Paul', photo: AVATARS[0]}], data: [], customCurrencies: {}, history: [] };
            window.trips.push(t);
            window.currentTripId = t.id;
            await save("建立專案");
        };

        window.deleteTripBtn = async () => {
            if (!confirm("確定要刪除整個專案？")) return;
            window.trips = window.trips.filter(t => String(t.id) !== String(window.currentTripId));
            window.currentTripId = window.trips.length > 0 ? window.trips[0].id : "";
            await setDoc(docRef, { trips: window.trips });
            render();
        };

        window.restoreHistory = async (idx) => {
            if (!confirm("確定要還原到此版本嗎？")) return;
            const trip = window.trips.find(t => String(t.id) === String(window.currentTripId));
            const version = trip.history[idx];
            trip.data = version.data;
            trip.members = version.members;
            trip.customCurrencies = version.currencies || {};
            await setDoc(docRef, { trips: window.trips });
            location.reload();
        };

        window.addExpenseRow = async () => {
            const name = document.getElementById('itemName').value;
            const amt = parseFloat(document.getElementById('amount').value);
            const currency = document.getElementById('currencySelect').value;
            const payer = document.getElementById('payerSelect').value;
            if (!name || isNaN(amt) || window.selectedMembers.length === 0) return alert("請填寫品項名稱與金額");
            const trip = window.trips.find(t => String(t.id) === String(window.currentTripId));
            const rate = (currency === 'TWD') ? 1 : (trip.customCurrencies[currency] || 1);
            trip.data.push({ id: Date.now(), name, rawAmt: amt, currency, rate, amount: amt * rate, payer, participants: [...window.selectedMembers] });
            document.getElementById('itemName').value = ""; document.getElementById('amount').value = "";
            await save(`新增消費: ${name}`);
        };

        window.deleteExpense = async (id) => {
            const trip = window.trips.find(t => String(t.id) === String(window.currentTripId));
            trip.data = trip.data.filter(d => d.id !== id);
            await save("刪除消費");
        };

        let activeMemberIdx = -1;
        window.openAvatarPicker = (idx) => { activeMemberIdx = idx; document.getElementById('avatarPicker').style.display = 'block'; };
        window.closeAvatarPicker = () => document.getElementById('avatarPicker').style.display = 'none';
        window.selectAvatar = async (idx) => {
            const trip = window.trips.find(t => String(t.id) === String(window.currentTripId));
            trip.members[activeMemberIdx].photo = AVATARS[idx];
            closeAvatarPicker();
            await save("更換頭像");
        };
        window.addMember = async () => {
            const n = prompt("人員姓名:");
            if (!n) return;
            const trip = window.trips.find(t => String(t.id) === String(window.currentTripId));
            trip.members.push({name: n, photo: AVATARS[0]});
            await save(`新增成員: ${n}`);
        };
    </script>
</body>
</html>
