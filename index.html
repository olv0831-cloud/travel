<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Paul的分帳神器</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        :root { --primary-color: #3b82f6; --bg-color: #f8fafc; --card-bg: #ffffff; --header-bg: #0f172a; }
        body { background-color: var(--bg-color); color: #1e293b; font-family: sans-serif; }
        .card { background-color: var(--card-bg); border-radius: 1.5rem; padding: 1.25rem; box-shadow: 0 4px 6px -1px rgba(0,0,0,0.1); }
        .sticky-header { position: sticky; top: 0; z-index: 50; }
        .avatar { width: 32px; height: 32px; border-radius: 50%; border: 2px solid #fff; cursor: pointer; }
        .collapsible-content { max-height: 0; overflow: hidden; transition: max-height 0.3s ease-out; }
        .expanded { max-height: 500px; }
        .history-item { display: flex; justify-content: space-between; align-items: center; padding: 8px 12px; background: white; border-bottom: 1px solid #f1f5f9; font-size: 11px; }
        @media print { .no-print { display: none !important; } }
    </style>
</head>
<body class="min-h-screen">

    <nav class="sticky-header bg-white border-b p-3 shadow-md no-print">
        <div class="max-w-7xl mx-auto flex justify-between items-center">
            <div class="font-black text-blue-600 text-lg italic">Paul的分帳神器</div>
            <div class="flex items-center gap-2">
                <select id="tripDropdown" onchange="switchTrip(this.value)" class="bg-gray-100 rounded-lg px-3 py-1.5 text-sm font-bold outline-none border-none"></select>
                <button onclick="createNewTrip()" class="text-blue-600 hover:scale-110"><i class="fa-solid fa-plus-circle text-2xl"></i></button>
            </div>
        </div>
    </nav>

    <header class="sticky-header bg-slate-900 text-white p-6 shadow-lg no-print" style="top: 60px;">
        <div class="max-w-7xl mx-auto flex justify-between items-center">
            <div>
                <h1 id="tripTitle" contenteditable="true" onblur="updateTripName()" class="text-2xl font-black p-1 rounded hover:bg-white/10">載入中...</h1>
                <p class="text-[10px] text-white/50 mt-1"><i class="fa-brands fa-google mr-1"></i>匯率基準：Google Finance 實時參考 (0.215)</p>
            </div>
            <button onclick="toggleTools()" class="bg-white/20 px-4 py-2 rounded-xl text-xs font-bold border border-white/20">工具與歷史</button>
        </div>
        <div id="toolPanel" class="max-w-7xl mx-auto collapsible-content mt-4 space-y-4">
            <div class="bg-white/10 p-4 rounded-2xl flex flex-wrap gap-3">
                <button onclick="exportToCSV()" class="bg-green-600 px-4 py-1.5 rounded-lg text-xs font-bold">匯出 CSV</button>
                <button onclick="window.print()" class="bg-blue-600 px-4 py-1.5 rounded-lg text-xs font-bold">列印報表</button>
                <button onclick="deleteTripBtn()" class="bg-red-500/80 px-4 py-1.5 rounded-lg text-xs font-bold">刪除專案</button>
            </div>
            <div class="bg-white/5 rounded-2xl overflow-hidden">
                <p class="p-3 text-[10px] font-bold text-white/40 border-b border-white/10 uppercase">編輯歷史紀錄 (可還原)</p>
                <div id="historyList" class="max-h-40 overflow-y-auto"></div>
            </div>
        </div>
    </header>

    <main class="max-w-7xl mx-auto px-4 py-8 grid grid-cols-1 lg:grid-cols-4 gap-6">
        <div class="lg:col-span-1 space-y-6 no-print">
            <div class="card border-t-4 border-blue-500">
                <h3 class="font-bold mb-4 text-sm"><i class="fa-solid fa-plus mr-2"></i>新增消費</h3>
                
                <div class="mb-3">
                    <label class="text-[10px] font-bold text-gray-400">消費類別</label>
                    <select id="category" class="w-full border p-2.5 rounded-xl mt-1 text-sm bg-gray-50">
                        <option value="餐飲">🍽️ 餐飲</option><option value="購物">🛍️ 購物</option>
                        <option value="娛樂">🎡 娛樂</option><option value="住宿">🏨 住宿</option>
                        <option value="交通">🚗 交通</option><option value="其它">📦 其它</option>
                    </select>
                </div>

                <input id="itemName" type="text" placeholder="項目名稱" class="w-full border p-3 rounded-xl mb-3 text-sm outline-none">
                
                <div class="flex border rounded-xl overflow-hidden mb-3">
                    <select id="currency" class="bg-gray-50 px-3 text-xs font-bold border-r"><option value="TWD">TWD</option><option value="JPY">JPY</option></select>
                    <input id="amount" type="number" placeholder="金額" class="flex-1 p-3 outline-none font-bold text-sm">
                </div>

                <div class="mb-4">
                    <label class="text-[10px] font-bold text-gray-400">付款人</label>
                    <select id="payer" class="w-full border p-2.5 rounded-xl mt-1 font-bold text-sm"></select>
                </div>

                <div class="mb-6">
                    <div class="flex justify-between items-center mb-2">
                        <label class="text-[10px] font-bold text-gray-400">參與人員 (勾選)</label>
                        <div class="flex items-center gap-1">
                            <input id="newMemberName" type="text" placeholder="+ 人名" class="text-[10px] border-b outline-none w-12 px-1">
                            <button onclick="addMember()" class="text-blue-500"><i class="fa-solid fa-plus-circle"></i></button>
                        </div>
                    </div>
                    <div id="memberCheckGrid" class="grid grid-cols-1 gap-2"></div>
                </div>
                <button onclick="addRow()" class="w-full py-4 rounded-2xl text-white font-black text-sm shadow-lg active:scale-95" style="background-color: var(--primary-color);">加入清單</button>
            </div>

            <div class="card">
                <h3 class="font-bold mb-4 text-sm">⚖️ 個人差額結算</h3>
                <div id="balanceList" class="space-y-2"></div>
            </div>
        </div>

        <div class="lg:col-span-3 space-y-6">
            <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
                <div class="card flex flex-col md:flex-row items-center gap-6 bg-slate-800 text-white overflow-hidden">
                    <div class="flex-1">
                        <p class="text-white/50 font-bold text-xs uppercase tracking-widest">總支出 (TWD)</p>
                        <p id="totalSpent" class="text-4xl font-black mt-2 tracking-tighter">$0</p>
                        <div id="categoryBreakdown" class="mt-4 space-y-1"></div>
                    </div>
                    <div class="w-32 h-32">
                        <canvas id="expenseChart"></canvas>
                    </div>
                </div>
                <div class="card border-2 border-dashed border-blue-100">
                    <h3 class="font-bold mb-3 text-sm"><i class="fa-solid fa-paper-plane text-blue-400 mr-2"></i>轉帳建議</h3>
                    <div id="settlementAdvice" class="space-y-2"></div>
                </div>
            </div>

            <div class="card p-0 overflow-hidden">
                <div class="overflow-x-auto">
                    <table class="w-full text-left">
                        <thead class="bg-gray-50 border-b text-[10px] font-black text-gray-400 uppercase tracking-widest">
                            <tr id="dynamicHeader"></tr>
                        </thead>
                        <tbody id="expenseList" class="text-xs divide-y"></tbody>
                    </table>
                </div>
            </div>
        </div>
    </main>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getFirestore, doc, onSnapshot, setDoc } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

        const firebaseConfig = { apiKey: "AIzaSyCLz4iTnKXkba26S4fRUdV6d0DTZiRXSg0", authDomain: "travel-expense-7dbaa.firebaseapp.com", projectId: "travel-expense-7dbaa", storageBucket: "travel-expense-7dbaa.firebasestorage.app", messagingSenderId: "745263115640", appId: "1:745263115640:web:5714e2c1d041969ecaec8d" };
        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);
        const tripsRef = doc(db, "travelData", "master_record");
        const AVATARS = ['https://cdn-icons-png.flaticon.com/512/3135/3135715.png', 'https://cdn-icons-png.flaticon.com/512/3135/3135768.png', 'https://cdn-icons-png.flaticon.com/512/194/194938.png', 'https://cdn-icons-png.flaticon.com/512/4140/4140048.png'];

        window.trips = [];
        window.currentTripId = localStorage.getItem('current_trip_id') || "";
        let chartInstance = null;

        const fmt = (num) => Math.round(num).toLocaleString('en-US');

        onSnapshot(tripsRef, (docSnap) => {
            if (docSnap.exists()) {
                window.trips = docSnap.data().trips || [];
                if (!window.currentTripId && window.trips.length > 0) window.currentTripId = window.trips[0].id;
                refreshAll();
            }
        });

        window.refreshAll = () => {
            const trip = window.trips.find(t => String(t.id) === String(window.currentTripId));
            if (!trip) return;

            document.getElementById('tripTitle').innerText = trip.name;
            document.getElementById('tripDropdown').innerHTML = window.trips.map(t => `<option value="${t.id}" ${String(t.id) === String(window.currentTripId) ? 'selected' : ''}>${t.name}</option>`).join('');
            
            if (!trip.members) trip.members = [{name: 'Paul', photo: AVATARS[0]}];
            document.getElementById('payer').innerHTML = trip.members.map(m => `<option value="${m.name}">${m.name}</option>`).join('');
            document.getElementById('memberCheckGrid').innerHTML = trip.members.map(m => `
                <div class="flex items-center gap-3 p-2 bg-gray-50 rounded-xl">
                    <img src="${m.photo || AVATARS[0]}" class="avatar">
                    <span class="text-xs font-bold flex-1">${m.name}</span>
                    <input type="checkbox" value="${m.name}" checked class="participant-checkbox w-4 h-4">
                </div>`).join('');

            // 表格標頭
            let headerHtml = `<th class="p-4">類別 / 項目</th><th class="p-4">付款人</th><th class="p-4">總金額</th>`;
            trip.members.forEach(m => headerHtml += `<th class="p-4 text-center">${m.name}</th>`);
            headerHtml += `<th class="p-4"></th>`;
            document.getElementById('dynamicHeader').innerHTML = headerHtml;

            let totalTWD = 0; 
            let balances = {}; 
            let catStats = { '餐飲':0, '購物':0, '娛樂':0, '住宿':0, '交通':0, '其它':0 };
            trip.members.forEach(m => balances[m.name] = 0);

            document.getElementById('expenseList').innerHTML = (trip.data || []).map(item => {
                totalTWD += item.amount;
                balances[item.payer] += item.amount;
                catStats[item.category || '其它'] += item.amount;
                const share = item.amount / item.participants.length;
                
                let memberCells = trip.members.map(m => {
                    const isPart = item.participants.includes(m.name);
                    if (isPart) balances[m.name] -= share;
                    return `<td class="p-4 text-center">${isPart ? `<span class="text-blue-500 font-bold">✔️</span>` : '-'}</td>`;
                }).join('');

                return `<tr>
                    <td class="p-4"><div class="flex items-center gap-2"><span class="text-lg">${getIcon(item.category)}</span><div><div class="font-bold">${item.name}</div><div class="text-[9px] text-gray-400">${item.date}</div></div></div></td>
                    <td class="p-4 font-bold text-gray-500">${item.payer}</td>
                    <td class="p-4 font-black text-blue-600">$${fmt(item.amount)}</td>
                    ${memberCells}
                    <td class="p-4 text-center"><i onclick="deleteExpense(${item.id})" class="fa-solid fa-trash-can text-red-200 hover:text-red-500 cursor-pointer"></i></td>
                </tr>`;
            }).join('');

            document.getElementById('totalSpent').innerText = `$${fmt(totalTWD)}`;
            document.getElementById('balanceList').innerHTML = trip.members.map(m => `
                <div class="flex justify-between items-center p-2 rounded-xl ${balances[m.name] >= 0 ? 'bg-green-50 text-green-700' : 'bg-red-50 text-red-700'}">
                    <span class="font-bold text-xs">${m.name}</span>
                    <span class="font-black text-xs">${balances[m.name] >= 0 ? '+' : ''}${fmt(balances[m.name])}</span>
                </div>`).join('');

            document.getElementById('historyList').innerHTML = (trip.history || []).map((h, i) => `
                <div class="history-item">
                    <span class="text-white/70">${h.time} - ${h.action}</span>
                    <button onclick="restoreHistory(${i})" class="bg-blue-600 text-white px-2 py-1 rounded text-[9px] font-bold">還原</button>
                </div>`).join('');

            updateChart(catStats);
            calculateAdvice(balances);
        };

        function getIcon(cat) {
            const icons = { '餐飲': '🍽️', '購物': '🛍️', '娛樂': '🎡', '住宿': '🏨', '交通': '🚗', '其它': '📦' };
            return icons[cat] || '📦';
        }

        function updateChart(stats) {
            const ctx = document.getElementById('expenseChart').getContext('2d');
            const data = Object.values(stats);
            const labels = Object.keys(stats);
            
            if (chartInstance) chartInstance.destroy();
            chartInstance = new Chart(ctx, {
                type: 'doughnut',
                data: {
                    labels: labels,
                    datasets: [{
                        data: data,
                        backgroundColor: ['#f87171', '#fbbf24', '#34d399', '#60a5fa', '#a78bfa', '#94a3b8'],
                        borderWidth: 0
                    }]
                },
                options: {
                    responsive: true,
                    plugins: { legend: { display: false } },
                    cutout: '70%'
                }
            });
        }

        window.addRow = async () => {
            const name = document.getElementById('itemName').value;
            let amount = parseFloat(document.getElementById('amount').value);
            const cat = document.getElementById('category').value;
            const curr = document.getElementById('currency').value;
            const payer = document.getElementById('payer').value;
            const parts = Array.from(document.querySelectorAll('.participant-checkbox:checked')).map(cb => cb.value);

            if (!name || isNaN(amount) || parts.length === 0) return alert("資訊填寫不完整");

            let rateInfo = "";
            if (curr === 'JPY') { amount = amount * 0.215; rateInfo = `(JPY換算)`; }

            const trip = window.trips.find(t => String(t.id) === String(window.currentTripId));
            if (!trip.history) trip.history = [];
            trip.history.unshift({ time: new Date().toLocaleTimeString(), action: `新增 ${name}`, data: JSON.parse(JSON.stringify(trip.data)), members: JSON.parse(JSON.stringify(trip.members)) });
            if (trip.history.length > 10) trip.history.pop();

            trip.data.unshift({ id: Date.now(), name, amount, category: cat, payer, participants: parts, rateInfo, date: new Date().toLocaleDateString() });
            await setDoc(tripsRef, { trips: window.trips });
            document.getElementById('itemName').value = ''; document.getElementById('amount').value = '';
        };

        window.restoreHistory = async (i) => {
            const trip = window.trips.find(t => String(t.id) === String(window.currentTripId));
            const target = trip.history[i];
            trip.data = JSON.parse(JSON.stringify(target.data));
            trip.members = JSON.parse(JSON.stringify(target.members));
            await setDoc(tripsRef, { trips: window.trips });
        };

        function calculateAdvice(balances) {
            let debtors = [], creditors = [];
            for (let name in balances) {
                if (balances[name] < -1) debtors.push({ name, amt: Math.abs(balances[name]) });
                else if (balances[name] > 1) creditors.push({ name, amt: balances[name] });
            }
            let advice = [];
            while (debtors.length && creditors.length) {
                let d = debtors[0], c = creditors[0], settle = Math.min(d.amt, c.amt);
                advice.push(`<div class="flex items-center justify-between text-[11px] p-2 bg-blue-50/50 rounded-lg border border-blue-100">
                    <span><b>${d.name}</b> <i class="fa-solid fa-arrow-right mx-1 text-gray-300"></i> <b>${c.name}</b></span>
                    <span class="font-black text-blue-600">$${fmt(settle)}</span>
                </div>`);
                d.amt -= settle; c.amt -= settle;
                if (d.amt <= 1) debtors.shift(); if (c.amt <= 1) creditors.shift();
            }
            document.getElementById('settlementAdvice').innerHTML = advice.length ? advice.join('') : '<p class="text-xs text-gray-400">目前無須轉帳</p>';
        }

        window.switchTrip = (id) => { window.currentTripId = id; localStorage.setItem('current_trip_id', id); refreshAll(); };
        window.toggleTools = () => document.getElementById('toolPanel').classList.toggle('expanded');
    </script>
</body>
</html>
