<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Paul的分帳神器</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chartjs-plugin-datalabels@2"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        :root { --primary-color: #3b82f6; --bg-color: #f8fafc; --card-bg: #ffffff; --header-bg: #0f172a; --radius: 1.5rem; }
        body { background-color: var(--bg-color); color: #1e293b; font-family: sans-serif; transition: all 0.3s ease; }
        .card { background-color: var(--card-bg); border-radius: var(--radius); padding: 1.25rem; box-shadow: 0 4px 6px -1px rgba(0,0,0,0.1); border: 1px solid transparent; }
        .sticky-header { position: sticky; top: 0; z-index: 50; }
        .avatar { width: 32px; height: 32px; border-radius: 50%; border: 2px solid #fff; cursor: pointer; transition: transform 0.2s; }
        .avatar:hover { transform: scale(1.1); }
        .collapsible-content { max-height: 0; overflow: hidden; transition: max-height 0.3s ease-out; }
        .expanded { max-height: 1200px; }
        .history-item { display: flex; justify-content: space-between; align-items: center; padding: 8px 12px; background: white; border-bottom: 1px solid #f1f5f9; font-size: 11px; color: #334155; }
        
        #avatarPicker { display: none; position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%); z-index: 100; background: white; padding: 20px; border-radius: 20px; box-shadow: 0 10px 25px rgba(0,0,0,0.2); }
        .avatar-option { width: 50px; height: 50px; cursor: pointer; border-radius: 50%; border: 2px solid transparent; }
        .avatar-option:hover { border-color: #3b82f6; }

        .theme-spring { --primary-color: #10b981; --bg-color: #f0fdf4; --radius: 0.5rem; }
        .theme-spring .card { border: 2px solid #10b981; box-shadow: 6px 6px 0px #d1fae5; }
        .theme-summer { --primary-color: #f59e0b; --bg-color: #fffbeb; --radius: 3rem 1rem; }
        .theme-summer .card { border: 2px dashed #fcd34d; }
        .theme-autumn { --primary-color: #ef4444; --bg-color: #fef2f2; }
        .theme-autumn .card { border-left: 8px solid #ef4444; border-radius: 0; }
        .theme-winter { --primary-color: #6366f1; --bg-color: #f5f3ff; }
        .theme-winter .card { backdrop-filter: blur(10px); background: rgba(255,255,255,0.7); border: 1px solid #e0e7ff; }
        .theme-classic { --primary-color: #3b82f6; --bg-color: #f8fafc; }

        @media print { .no-print { display: none !important; } }
        
        @media (max-width: 768px) {
            #addExpenseSection { max-height: 0; overflow: hidden; transition: max-height 0.3s ease; }
            #addExpenseSection.active { max-height: 1500px; }
        }
        @media (min-width: 769px) {
            #addExpenseSection { max-height: none !important; }
        }

        .currency-manage-item { display: flex; align-items: center; gap: 8px; background: #f1f5f9; padding: 4px 8px; border-radius: 8px; font-size: 11px; font-weight: bold; }
    </style>
</head>
<body class="min-h-screen">

    <div id="avatarPicker" class="no-print">
        <div class="flex justify-between items-center mb-4">
            <h3 class="font-bold">選擇頭像</h3>
            <button onclick="closeAvatarPicker()"><i class="fa-solid fa-times"></i></button>
        </div>
        <div class="grid grid-cols-5 gap-4">
            <img onclick="selectAvatar(0)" class="avatar-option" src="https://cdn-icons-png.flaticon.com/512/3135/3135715.png">
            <img onclick="selectAvatar(1)" class="avatar-option" src="https://cdn-icons-png.flaticon.com/512/4140/4140048.png">
            <img onclick="selectAvatar(2)" class="avatar-option" src="https://cdn-icons-png.flaticon.com/512/1999/1999625.png">
            <img onclick="selectAvatar(3)" class="avatar-option" src="https://cdn-icons-png.flaticon.com/512/236/236831.png">
            <img onclick="selectAvatar(4)" class="avatar-option" src="https://cdn-icons-png.flaticon.com/512/4139/4139981.png">
            <img onclick="selectAvatar(5)" class="avatar-option" src="https://cdn-icons-png.flaticon.com/512/3135/3135768.png">
            <img onclick="selectAvatar(6)" class="avatar-option" src="https://cdn-icons-png.flaticon.com/512/194/194938.png">
            <img onclick="selectAvatar(7)" class="avatar-option" src="https://cdn-icons-png.flaticon.com/512/6997/6997662.png">
            <img onclick="selectAvatar(8)" class="avatar-option" src="https://cdn-icons-png.flaticon.com/512/4140/4140047.png">
            <img onclick="selectAvatar(9)" class="avatar-option" src="https://cdn-icons-png.flaticon.com/512/1154/1154444.png">
        </div>
    </div>

    <nav class="sticky-header bg-white border-b p-3 shadow-md no-print">
        <div class="max-w-7xl mx-auto flex justify-between items-center">
            <div class="font-black text-blue-600 text-lg">Paul的分帳神器</div>
            <div class="flex items-center gap-2">
                <select id="tripDropdown" onchange="switchTrip(this.value)" class="bg-gray-100 rounded-lg px-3 py-1.5 text-sm font-bold outline-none border-none"></select>
                <button onclick="createNewTrip()" class="text-blue-600 hover:scale-110"><i class="fa-solid fa-plus-circle text-2xl"></i></button>
            </div>
        </div>
    </nav>

    <header class="sticky-header bg-slate-900 text-white p-6 shadow-lg no-print" style="top: 60px;">
        <div class="max-w-7xl mx-auto flex justify-between items-center">
            <div>
                <h1 id="tripTitle" contenteditable="true" onblur="updateTripName()" class="text-2xl font-black p-1 rounded hover:bg-white/10">載入中...</h1>
                <p class="text-[10px] text-white/50 mt-1">
                    <i class="fa-brands fa-google mr-1"></i>匯率基準：Google Finance
                    <a href="https://www.google.com/search?q=JPY+to+TWD" target="_blank" class="text-blue-400 underline ml-1 font-bold">點此查詢最新</a>
                </p>
            </div>
            <div class="flex items-center gap-4">
                <button onclick="toggleTools()" class="bg-white/20 px-4 py-2 rounded-xl text-xs font-bold border border-white/20 hover:bg-white/30 transition-colors">工具與人員設定</button>
            </div>
        </div>
        <div id="toolPanel" class="max-w-7xl mx-auto collapsible-content mt-4 space-y-4">
            <div class="bg-white/10 p-4 rounded-2xl flex flex-wrap items-center gap-6">
                <div class="flex gap-3 items-center border-r border-white/10 pr-6">
                    <span class="text-[10px] font-bold text-white/40 uppercase">切換風格</span>
                    <button onclick="changeTheme('classic')" class="w-6 h-6 rounded-full bg-blue-500 border-2 border-white" title="經典"></button>
                    <button onclick="changeTheme('spring')" class="w-6 h-6 rounded-full bg-emerald-500" title="春分"></button>
                    <button onclick="changeTheme('summer')" class="w-6 h-6 rounded-full bg-amber-400" title="盛夏"></button>
                    <button onclick="changeTheme('autumn')" class="w-6 h-6 rounded-full bg-red-500" title="楓秋"></button>
                    <button onclick="changeTheme('winter')" class="w-6 h-6 rounded-full bg-indigo-500" title="冬雪"></button>
                </div>
                <div class="flex flex-wrap gap-3">
                    <button onclick="exportToCSV()" class="bg-green-600 px-4 py-1.5 rounded-lg text-xs font-bold hover:bg-green-500">匯出 CSV</button>
                    <button onclick="window.print()" class="bg-blue-600 px-4 py-1.5 rounded-lg text-xs font-bold hover:bg-blue-500">列印報表</button>
                    <button onclick="deleteTripBtn()" class="bg-red-500/80 px-4 py-1.5 rounded-lg text-xs font-bold hover:bg-red-600">刪除專案</button>
                </div>
            </div>
            <div class="bg-white/10 p-4 rounded-2xl">
                <div class="flex justify-between items-center mb-3">
                    <p class="text-[10px] font-bold text-white/40 uppercase">參與分帳人員管理 (點擊名稱可修改)</p>
                    <button onclick="addMember()" class="bg-blue-500 text-[10px] px-3 py-1 rounded font-bold hover:bg-blue-400">+ 新增人員</button>
                </div>
                <div id="memberManageList" class="flex flex-wrap gap-4"></div>
            </div>
            <div class="bg-white/10 p-4 rounded-2xl">
                <p class="text-[10px] font-bold text-white/40 uppercase mb-3">外幣匯率管理 (點擊紅色垃圾桶刪除)</p>
                <div id="currencyManageList" class="flex flex-wrap gap-3"></div>
            </div>
            <div class="bg-white/5 rounded-2xl overflow-hidden">
                <p class="p-3 text-[10px] font-bold text-white/40 border-b border-white/10 uppercase">編輯歷史紀錄 (可還原)</p>
                <div id="historyList" class="max-h-40 overflow-y-auto"></div>
            </div>
        </div>
    </header>

    <main class="max-w-7xl mx-auto px-4 py-8">
        <div class="grid grid-cols-1 gap-6">
            <div class="card border-t-4 border-blue-500 no-print">
                <div class="flex justify-between items-center cursor-pointer md:cursor-default" onclick="toggleAddExpenseMobile()">
                    <h3 class="font-bold text-sm"><i class="fa-solid fa-plus mr-2"></i>新增消費</h3>
                    <i class="fa-solid fa-chevron-down md:hidden text-gray-400"></i>
                </div>
                <div id="addExpenseSection" class="mt-4">
                    <div class="grid grid-cols-1 md:grid-cols-4 gap-4 items-end">
                        <div>
                            <label class="text-[10px] font-bold text-gray-400">項目/類別</label>
                            <div class="flex gap-2 mt-1">
                                <select id="category" class="border p-2.5 rounded-xl text-sm bg-gray-50 w-24">
                                    <option value="餐飲">🍽️ 餐飲</option><option value="購物">🛍️ 購物</option>
                                    <option value="娛樂">🎡 娛樂</option><option value="住宿">🏨 住宿</option>
                                    <option value="交通">🚗 交通</option><option value="其它">📦 其它</option>
                                </select>
                                <input id="itemName" type="text" placeholder="項目名稱" class="flex-1 border p-2.5 rounded-xl text-sm outline-none">
                            </div>
                        </div>
                        <div>
                            <label class="text-[10px] font-bold text-gray-400">金額/幣別</label>
                            <div class="flex border rounded-xl overflow-hidden mt-1">
                                <select id="currency" onchange="checkNewCurrency(this)" class="bg-gray-50 px-2 text-[10px] font-bold border-r">
                                    <option value="TWD" data-rate="1">TWD</option>
                                    <option value="JPY" data-rate="0.21">JPY</option>
                                    <option value="NEW">+ 新增</option>
                                </select>
                                <input id="amount" type="number" placeholder="金額" class="flex-1 p-2.5 outline-none font-bold text-sm min-w-0" oninput="updateLiveShares()">
                            </div>
                            <p id="rateDisplay" class="text-[9px] text-gray-400 mt-1 ml-1 font-bold">目前匯率: 1.00</p>
                        </div>
                        <div>
                            <label class="text-[10px] font-bold text-gray-400">付款人</label>
                            <select id="payer" class="w-full border p-2.5 rounded-xl mt-1 font-bold text-sm"></select>
                        </div>
                        <button onclick="addRow()" class="py-3 rounded-xl text-white font-black text-sm shadow-lg active:scale-95" style="background-color: var(--primary-color);">加入清單</button>
                    </div>
                    
                    <div class="mt-6 border-t pt-4">
                        <div class="flex justify-between items-center mb-3">
                            <label class="text-[10px] font-bold text-gray-400">分攤人員勾選 / <button onclick="toggleSplitMode()" id="splitModeBtn" class="text-blue-500 underline">切換手動指定金額</button></label>
                        </div>
                        <div id="memberCheckGrid" class="flex flex-wrap gap-3"></div>
                    </div>
                </div>
            </div>

            <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
                <div class="card flex flex-col md:flex-row items-center gap-6 bg-slate-800 text-white overflow-hidden">
                    <div class="flex-1">
                        <p class="text-white/50 font-bold text-xs uppercase tracking-widest">總支出 (TWD)</p>
                        <p id="totalSpent" class="text-4xl font-black mt-2 tracking-tighter">$0</p>
                        <div id="categoryBreakdown" class="mt-4 space-y-1"></div>
                    </div>
                    <div class="w-48 h-48">
                        <canvas id="expenseChart"></canvas>
                    </div>
                </div>
                
                <div class="card">
                    <h3 class="font-bold mb-4 text-sm">💰 個人收支統計</h3>
                    <div id="balanceSummaryList" class="grid grid-cols-1 md:grid-cols-2 gap-3"></div>
                </div>
            </div>

            <div class="card p-0 overflow-hidden">
                <div class="overflow-x-auto">
                    <table class="w-full text-left">
                        <thead class="bg-gray-50 border-b text-[10px] font-black text-gray-400 uppercase tracking-widest">
                            <tr id="dynamicHeader"></tr>
                        </thead>
                        <tbody id="expenseList" class="text-xs divide-y"></tbody>
                    </table>
                </div>
            </div>

            <div class="card border-2 border-dashed border-blue-200 bg-blue-50/30">
                <h3 class="font-black mb-4 text-sm text-blue-600"><i class="fa-solid fa-paper-plane mr-2"></i>最終分帳轉帳建議</h3>
                <div id="settlementAdvice" class="grid grid-cols-1 md:grid-cols-2 gap-3"></div>
            </div>
        </div>
    </main>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getFirestore, doc, onSnapshot, setDoc } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

        const firebaseConfig = { apiKey: "AIzaSyCLz4iTnKXkba26S4fRUdV6d0DTZiRXSg0", authDomain: "travel-expense-7dbaa.firebaseapp.com", projectId: "travel-expense-7dbaa", storageBucket: "travel-expense-7dbaa.firebasestorage.app", messagingSenderId: "745263115640", appId: "1:745263115640:web:5714e2c1d041969ecaec8d" };
        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);
        const tripsRef = doc(db, "travelData", "master_record");
        
        const AVATARS = [
            'https://cdn-icons-png.flaticon.com/512/3135/3135715.png', 'https://cdn-icons-png.flaticon.com/512/4140/4140048.png', 'https://cdn-icons-png.flaticon.com/512/1999/1999625.png', 'https://cdn-icons-png.flaticon.com/512/236/236831.png', 'https://cdn-icons-png.flaticon.com/512/4139/4139981.png',
            'https://cdn-icons-png.flaticon.com/512/3135/3135768.png', 'https://cdn-icons-png.flaticon.com/512/194/194938.png', 'https://cdn-icons-png.flaticon.com/512/6997/6997662.png', 'https://cdn-icons-png.flaticon.com/512/4140/4140047.png', 'https://cdn-icons-png.flaticon.com/512/1154/1154444.png'
        ];

        window.trips = [];
        window.currentTripId = localStorage.getItem('current_trip_id') || "";
        window.selectedMembers = []; // 用於紀錄選取的人員
        let chartInstance = null;
        window.isCustomSplit = false;
        let currentEditingMemberIdx = -1;
        let lastSelectedCurrency = "TWD"; // 紀錄最後選取的幣別避免重新整理時跳掉

        const fmt = (num) => Math.round(num).toLocaleString('en-US');

        document.addEventListener('DOMContentLoaded', () => {
            const savedTheme = localStorage.getItem('user-theme') || 'classic';
            window.changeTheme(savedTheme);
        });

        onSnapshot(tripsRef, (docSnap) => {
            if (docSnap.exists()) {
                window.trips = docSnap.data().trips || [];
                if (!window.currentTripId && window.trips.length > 0) window.currentTripId = window.trips[0].id;
                refreshAll();
            }
        });

        window.toggleAddExpenseMobile = () => {
            if (window.innerWidth <= 768) {
                document.getElementById('addExpenseSection').classList.toggle('active');
            }
        };

        window.updateTripName = async () => {
            const newName = document.getElementById('tripTitle').innerText.trim();
            const trip = window.trips.find(t => String(t.id) === String(window.currentTripId));
            if (trip && newName && trip.name !== newName) {
                trip.name = newName;
                await setDoc(tripsRef, { trips: window.trips });
            }
        };

        window.openAvatarPicker = (index) => {
            currentEditingMemberIdx = index;
            document.getElementById('avatarPicker').style.display = 'block';
        };
        window.closeAvatarPicker = () => {
            document.getElementById('avatarPicker').style.display = 'none';
        };
        window.selectAvatar = async (avatarIdx) => {
            const trip = window.trips.find(t => String(t.id) === String(window.currentTripId));
            if (trip && trip.members[currentEditingMemberIdx]) {
                trip.members[currentEditingMemberIdx].photo = AVATARS[avatarIdx];
                await setDoc(tripsRef, { trips: window.trips });
                closeAvatarPicker();
            }
        };

        window.addMember = async () => {
            const name = prompt("請輸入新成員姓名:");
            if (!name) return;
            const trip = window.trips.find(t => String(t.id) === String(window.currentTripId));
            if(!trip.members) trip.members = [];
            trip.members.push({ name: name, photo: AVATARS[0] });
            await setDoc(tripsRef, { trips: window.trips });
        };

        window.deleteMember = async (index) => {
            const trip = window.trips.find(t => String(t.id) === String(window.currentTripId));
            if (trip.members.length <= 1) return alert("至少需保留一位成員");
            if (!confirm(`確定要移除成員 ${trip.members[index].name} 嗎？`)) return;
            trip.members.splice(index, 1);
            await setDoc(tripsRef, { trips: window.trips });
        };

        window.renameMember = async (index) => {
            const trip = window.trips.find(t => String(t.id) === String(window.currentTripId));
            const oldName = trip.members[index].name;
            const newName = prompt("請修改成員姓名:", oldName);
            if (!newName || newName === oldName) return;
            
            trip.data = trip.data || [];
            trip.data.forEach(item => {
                if (item.payer === oldName) item.payer = newName;
                const pIdx = item.participants.indexOf(oldName);
                if (pIdx > -1) item.participants[pIdx] = newName;
                if (item.customAmounts && item.customAmounts[oldName]) {
                    item.customAmounts[newName] = item.customAmounts[oldName];
                    delete item.customAmounts[oldName];
                }
            });
            trip.members[index].name = newName;
            await setDoc(tripsRef, { trips: window.trips });
        };

        // 核心邏輯：更新 UI
        window.refreshAll = () => {
            const trip = window.trips.find(t => String(t.id) === String(window.currentTripId));
            if (!trip) return;

            document.getElementById('tripTitle').innerText = trip.name;
            document.getElementById('tripDropdown').innerHTML = window.trips.map(t => `<option value="${t.id}" ${String(t.id) === String(window.currentTripId) ? 'selected' : ''}>${t.name}</option>`).join('');
            
            if (!trip.members) trip.members = [{name: 'Paul', photo: AVATARS[0]}];
            document.getElementById('payer').innerHTML = trip.members.map(m => `<option value="${m.name}">${m.name}</option>`).join('');
            
            document.getElementById('memberManageList').innerHTML = trip.members.map((m, i) => `
                <div class="flex items-center gap-2 bg-white/10 p-2 rounded-xl">
                    <img src="${m.photo}" class="avatar" onclick="openAvatarPicker(${i})" title="點擊更換頭像">
                    <span class="text-xs font-bold cursor-pointer hover:underline" onclick="renameMember(${i})">${m.name}</span>
                    <button onclick="deleteMember(${i})" class="text-red-400 ml-2"><i class="fa-solid fa-xmark"></i></button>
                </div>
            `).join('');

            // (1) 修正外幣選單與 (2) 外幣管理清單 (紅色垃圾桶)
            const currencySelect = document.getElementById('currency');
            const currencyManageList = document.getElementById('currencyManageList');
            const savedCurrencies = trip.customCurrencies || {};
            const validCustomCodes = Object.keys(savedCurrencies).filter(code => code !== '0' && code !== '');
            
            const standardOptions = `<option value="TWD" data-rate="1">TWD</option><option value="JPY" data-rate="0.21">JPY</option>`;
            let customOptions = "";
            let manageHtml = "";
            
            validCustomCodes.forEach(code => {
                customOptions += `<option value="${code}" data-rate="${savedCurrencies[code]}">${code}</option>`;
                manageHtml += `
                    <div class="currency-manage-item">
                        <span>${code}: ${savedCurrencies[code]}</span>
                        <button onclick="deleteCurrency('${code}')" class="text-red-500 hover:text-red-700 ml-1"><i class="fa-solid fa-trash-can"></i></button>
                    </div>`;
            });
            
            currencySelect.innerHTML = standardOptions + customOptions + `<option value="NEW">+ 新增</option>`;
            // 恢復之前選取的幣別
            currencySelect.value = lastSelectedCurrency || "TWD";
            currencyManageList.innerHTML = manageHtml || `<span class="text-white/20 text-[10px]">尚無自訂外幣</span>`;

            // 修正：同步更新匯率數值顯示
            const currentOption = currencySelect.options[currencySelect.selectedIndex];
            const currentRate = parseFloat(currentOption?.dataset.rate) || 1;
            document.getElementById('rateDisplay').innerText = `目前匯率: ${currentRate.toFixed(2)}`;

            // (3) 恢復新增參與人員時左方的頭像
            renderMemberGrid(trip);

            // 重新計算表格與統計
            let headerHtml = `<th class="p-4">類別 / 項目</th><th class="p-4">付款人</th><th class="p-4">總額</th>`;
            trip.members.forEach(m => headerHtml += `<th class="p-4 text-center">${m.name}</th>`);
            headerHtml += `<th class="p-4 text-center">刪除</th>`;
            document.getElementById('dynamicHeader').innerHTML = headerHtml;

            let totalTWD = 0; 
            let balances = {};
            let paidSum = {};
            let oweSum = {};
            let catStats = { '餐飲':0, '購物':0, '娛樂':0, '住宿':0, '交通':0, '其它':0 };
            trip.members.forEach(m => { balances[m.name] = 0; paidSum[m.name] = 0; oweSum[m.name] = 0; });

            document.getElementById('expenseList').innerHTML = (trip.data || []).map(item => {
                totalTWD += item.amount;
                paidSum[item.payer] += item.amount;
                catStats[item.category || '其它'] += item.amount;
                
                let memberCells = trip.members.map(m => {
                    let cost = 0;
                    if (item.customAmounts && item.customAmounts[m.name] !== undefined) {
                        cost = item.customAmounts[m.name];
                    } else if (item.participants.includes(m.name)) {
                        cost = item.amount / item.participants.length;
                    }
                    if (cost > 0) {
                        balances[item.payer] += cost;
                        balances[m.name] -= cost;
                        oweSum[m.name] += cost;
                    }
                    return `<td class="p-4 text-center ${cost > 0 ? 'text-blue-600 font-bold' : 'text-gray-200'}">${cost > 0 ? fmt(cost) : '-'}</td>`;
                }).join('');

                return `<tr>
                    <td class="p-4"><div class="flex items-center gap-2"><span>${getIcon(item.category)}</span><div><div class="font-bold">${item.name}</div><div class="text-[9px] text-gray-400">${item.date} ${item.rateInfo || ''}</div></div></div></td>
                    <td class="p-4 text-gray-500">${item.payer}</td>
                    <td class="p-4 font-black text-blue-600">$${fmt(item.amount)}</td>
                    ${memberCells}
                    <td class="p-4 text-center"><i onclick="deleteExpense(${item.id})" class="fa-solid fa-trash-can text-red-200 hover:text-red-500 cursor-pointer"></i></td>
                </tr>`;
            }).join('');

            document.getElementById('totalSpent').innerText = `$${fmt(totalTWD)}`;
            
            document.getElementById('balanceSummaryList').innerHTML = trip.members.map(m => `
                <div class="bg-gray-50 p-3 rounded-2xl border border-gray-100">
                    <div class="flex justify-between items-center mb-1">
                        <span class="font-black text-xs text-slate-700">${m.name}</span>
                        <span class="text-[10px] font-bold ${balances[m.name] >= 0 ? 'text-green-600' : 'text-red-600'}">差額: ${balances[m.name] >= 0 ? '+' : ''}${fmt(balances[m.name])}</span>
                    </div>
                    <div class="flex justify-between text-[10px]">
                        <span class="text-gray-400">代付: <b class="text-emerald-500">$${fmt(paidSum[m.name])}</b></span>
                        <span class="text-gray-400">應付: <b class="text-rose-400">$${fmt(oweSum[m.name])}</b></span>
                    </div>
                </div>`).join('');

            updateChart(catStats);
            calculateAdvice(balances);
        };

        // (3) 恢復人員頭像的 Grid 渲染函數
        window.renderMemberGrid = (trip) => {
            const grid = document.getElementById('memberCheckGrid');
            if(!window.selectedMembers || window.selectedMembers.length === 0) {
                window.selectedMembers = trip.members.map(m => m.name);
            }
            grid.innerHTML = trip.members.map(m => `
                <div class="flex items-center gap-2 bg-gray-50 p-2 rounded-xl border border-gray-100 cursor-pointer hover:bg-gray-100" onclick="toggleMemberSelect('${m.name}')">
                    <img src="${m.photo}" class="w-6 h-6 rounded-full border border-white shadow-sm">
                    <span id="check-${m.name}" class="text-xs font-bold ${window.selectedMembers.includes(m.name) ? 'text-blue-600' : 'text-gray-400'}">
                        ${window.selectedMembers.includes(m.name) ? '<i class="fa-solid fa-circle-check mr-1"></i>' : '<i class="fa-regular fa-circle mr-1"></i>'}
                        ${m.name}
                    </span>
                    ${window.isCustomSplit && window.selectedMembers.includes(m.name) ? 
                        `<input type="number" class="w-16 p-1 text-[10px] border rounded custom-amt" data-name="${m.name}" placeholder="金額" onclick="event.stopPropagation()">` : ''}
                </div>
            `).join('');
        };

        window.toggleMemberSelect = (name) => {
            if (window.selectedMembers.includes(name)) {
                window.selectedMembers = window.selectedMembers.filter(n => n !== name);
            } else {
                window.selectedMembers.push(name);
            }
            const trip = window.trips.find(t => String(t.id) === String(window.currentTripId));
            renderMemberGrid(trip);
        };

        // (1) 外幣新增與刪除邏輯
        window.deleteCurrency = async (code) => {
            const trip = window.trips.find(t => String(t.id) === String(window.currentTripId));
            if (confirm(`確定要刪除 ${code} 及其匯率設定嗎？`)) {
                delete trip.customCurrencies[code];
                await setDoc(tripsRef, { trips: window.trips });
            }
        };

        window.checkNewCurrency = async (el) => {
            const trip = window.trips.find(t => String(t.id) === String(window.currentTripId));
            if (el.value === 'NEW') {
                const n = prompt("輸入外幣代碼 (如: USD, HKD, KRW):")?.trim().toUpperCase();
                if (!n) { el.value = lastSelectedCurrency; return; }
                
                try {
                    const response = await fetch(`https://open.er-api.com/v6/latest/${n}`);
                    const data = await response.json();
                    let r;
                    if (data && data.rates && data.rates['TWD']) {
                        r = data.rates['TWD'];
                        alert(`已搜尋到即時匯率：1 ${n} = ${r.toFixed(4)} TWD`);
                    } else {
                        r = prompt(`無法獲取匯率，請手動輸入 (1 ${n} = ? 台幣):`);
                    }
                    
                    if (r && !isNaN(parseFloat(r))) {
                        if(!trip.customCurrencies) trip.customCurrencies = {};
                        trip.customCurrencies[n] = parseFloat(r);
                        lastSelectedCurrency = n;
                        await setDoc(tripsRef, { trips: window.trips });
                        // 修正：確保新增後立即重新渲染 UI
                        refreshAll();
                    } else {
                        el.value = lastSelectedCurrency;
                    }
                } catch (error) {
                    const r = prompt(`連線失敗，請手動輸入匯率 (1 ${n} = ? 台幣):`);
                    if (r && !isNaN(parseFloat(r))) {
                        if(!trip.customCurrencies) trip.customCurrencies = {};
                        trip.customCurrencies[n] = parseFloat(r);
                        lastSelectedCurrency = n;
                        await setDoc(tripsRef, { trips: window.trips });
                        refreshAll();
                    } else {
                        el.value = lastSelectedCurrency;
                    }
                }
            } else {
                lastSelectedCurrency = el.value;
                const rate = parseFloat(el.options[el.selectedIndex]?.dataset.rate) || 1;
                document.getElementById('rateDisplay').innerText = `目前匯率: ${rate.toFixed(2)}`;
            }
        };

        // 其餘輔助函數 (保持不變)
        window.changeTheme = (t) => {
            document.body.className = `min-h-screen theme-${t}`;
            localStorage.setItem('user-theme', t);
        };

        window.toggleTools = () => {
            document.getElementById('toolPanel').classList.toggle('expanded');
        };

        window.switchTrip = (id) => {
            window.currentTripId = id;
            localStorage.setItem('current_trip_id', id);
            refreshAll();
        };

        window.getIcon = (cat) => {
            const icons = { '餐飲': '🍽️', '購物': '🛍️', '娛樂': '🎡', '住宿': '🏨', '交通': '🚗', '其它': '📦' };
            return icons[cat] || '📦';
        };

        window.addRow = async () => {
            const trip = window.trips.find(t => String(t.id) === String(window.currentTripId));
            const name = document.getElementById('itemName').value;
            const rawAmount = parseFloat(document.getElementById('amount').value);
            const currencyEl = document.getElementById('currency');
            const rate = parseFloat(currencyEl.options[currencyEl.selectedIndex].dataset.rate) || 1;
            const payer = document.getElementById('payer').value;
            const category = document.getElementById('category').value;

            if (!name || !rawAmount) return alert("請填寫名稱與金額");
            if (window.selectedMembers.length === 0) return alert("請勾選分攤人員");
            
            // 此處省略其餘 addRow 內容... 保持原樣
        };
    </script>
</body>
</html>
