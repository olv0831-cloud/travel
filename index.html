<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Paul的分帳神器</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chartjs-plugin-datalabels@2"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        :root { --primary-color: #3b82f6; --bg-color: #f8fafc; --card-bg: #ffffff; --header-bg: #0f172a; --radius: 1.5rem; }
        body { background-color: var(--bg-color); color: #1e293b; font-family: sans-serif; transition: all 0.3s ease; }
        .card { background-color: var(--card-bg); border-radius: var(--radius); padding: 1.25rem; box-shadow: 0 4px 6px -1px rgba(0,0,0,0.1); border: 1px solid transparent; }
        .sticky-header { position: sticky; top: 0; z-index: 50; }
        .avatar { width: 32px; height: 32px; border-radius: 50%; border: 2px solid #fff; cursor: pointer; transition: transform 0.2s; }
        .collapsible-content { max-height: 0; overflow: hidden; transition: max-height 0.3s ease-out; }
        .expanded { max-height: 1200px; }
        .history-item { display: flex; justify-content: space-between; align-items: center; padding: 8px 12px; background: rgba(255,255,255,0.05); border-bottom: 1px solid rgba(255,255,255,0.1); font-size: 11px; color: #cbd5e1; }
        #avatarPicker { display: none; position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%); z-index: 100; background: white; padding: 20px; border-radius: 20px; box-shadow: 0 10px 25px rgba(0,0,0,0.2); }
    </style>
</head>
<body class="min-h-screen">

    <div id="avatarPicker">
        <div class="flex justify-between items-center mb-4"><h3 class="font-bold">選擇頭像</h3><button onclick="closeAvatarPicker()"><i class="fa-solid fa-times"></i></button></div>
        <div id="avatarGrid" class="grid grid-cols-5 gap-4"></div>
    </div>

    <nav class="sticky-header bg-white border-b p-3 shadow-md">
        <div class="max-w-7xl mx-auto flex justify-between items-center">
            <div class="font-black text-blue-600 text-lg">Paul的分帳神器</div>
            <div class="flex items-center gap-2">
                <select id="tripDropdown" onchange="switchTrip(this.value)" class="bg-gray-100 rounded-lg px-3 py-1.5 text-sm font-bold border-none outline-none"></select>
                <button onclick="createNewTrip()" class="text-blue-600 hover:scale-110"><i class="fa-solid fa-plus-circle text-2xl"></i></button>
            </div>
        </div>
    </nav>

    <header class="bg-slate-900 text-white p-6 shadow-lg">
        <div class="max-w-7xl mx-auto flex justify-between items-center">
            <div>
                <h1 id="tripTitle" contenteditable="true" onblur="updateTripName()" class="text-2xl font-black p-1 rounded hover:bg-white/10">載入中...</h1>
                <p class="text-[10px] text-blue-400 mt-1 font-bold">手動匯率模式 (穩定版)</p>
            </div>
            <button onclick="toggleTools()" class="bg-white/20 px-4 py-2 rounded-xl text-xs font-bold border border-white/20">工具與設定</button>
        </div>
        
        <div id="toolPanel" class="max-w-7xl mx-auto collapsible-content mt-4 space-y-4">
            <div class="bg-white/10 p-5 rounded-2xl border border-white/10">
                <div class="flex justify-between items-center mb-3">
                    <p class="text-[10px] font-bold text-white/40 uppercase">💱 幣別管理</p>
                    <button onclick="fetchLatestRates()" class="bg-blue-500 hover:bg-blue-400 text-[10px] px-3 py-1 rounded font-bold">
                        <i class="fa-solid fa-sync mr-1"></i>更新即時匯率 (JPY/EUR)
                    </button>
                </div>
                <div class="flex flex-wrap gap-3 items-center mb-4">
                    <input id="newCurrencyCode" type="text" placeholder="幣別(如:HKD)" class="bg-white/20 border-none rounded-lg px-3 py-2 text-sm w-32 text-white placeholder:text-white/30 outline-none">
                    <input id="newCurrencyRate" type="number" step="0.0001" placeholder="對台幣匯率" class="bg-white/20 border-none rounded-lg px-3 py-2 text-sm w-32 text-white placeholder:text-white/30 outline-none">
                    <button onclick="addNewCurrency()" class="bg-blue-600 px-4 py-2 rounded-lg text-sm font-bold hover:bg-blue-500">新增幣別</button>
                </div>
                <div id="currencyList" class="flex flex-wrap gap-2"></div>
            </div>

            <div class="bg-white/10 p-4 rounded-2xl">
                <div class="flex justify-between items-center mb-3">
                    <p class="text-[10px] font-bold text-white/40 uppercase">人員管理</p>
                    <button onclick="addMember()" class="bg-blue-500 text-[10px] px-3 py-1 rounded font-bold">+ 新增人員</button>
                </div>
                <div id="memberManageList" class="flex flex-wrap gap-4"></div>
            </div>
            <div class="bg-white/5 rounded-2xl overflow-hidden">
                <p class="p-3 text-[10px] font-bold text-white/40 border-b border-white/10 uppercase">歷史紀錄</p>
                <div id="historyList" class="max-h-40 overflow-y-auto"></div>
            </div>
            <div class="flex justify-end"><button onclick="deleteTripBtn()" class="bg-red-500/80 px-4 py-1.5 rounded-lg text-xs font-bold">刪除專案</button></div>
        </div>
    </header>

    <main class="max-w-7xl mx-auto px-4 py-8">
        <div class="grid grid-cols-1 gap-6">
            <div class="card border-t-4 border-blue-500">
                <h3 class="font-bold text-sm mb-4">📝 新增消費項目</h3>
                <div class="grid grid-cols-1 md:grid-cols-4 gap-4 items-end">
                    <div>
                        <label class="text-[10px] font-bold text-gray-400">品項名稱</label>
                        <input id="itemName" type="text" placeholder="例如：早餐" class="w-full border p-2.5 rounded-xl text-sm mt-1 outline-none">
                    </div>
                    <div>
                        <label class="text-[10px] font-bold text-gray-400">金額與幣別</label>
                        <div class="flex border rounded-xl overflow-hidden mt-1">
                            <select id="currencySelect" class="bg-gray-50 px-2 text-xs font-bold border-r outline-none"></select>
                            <input id="amount" type="number" placeholder="0" class="w-full p-2.5 outline-none font-bold text-sm">
                        </div>
                    </div>
                    <div>
                        <label class="text-[10px] font-bold text-gray-400">付款人</label>
                        <select id="payerSelect" class="w-full border p-2.5 rounded-xl text-sm font-bold outline-none"></select>
                    </div>
                    <button onclick="addExpenseRow()" class="bg-blue-600 text-white py-3 rounded-xl font-bold shadow-lg hover:bg-blue-500">加入帳單</button>
                </div>
                <div class="mt-6 border-t pt-4">
                    <label class="text-[10px] font-bold text-gray-400 block mb-3">分攤人員</label>
                    <div id="memberCheckGrid" class="flex flex-wrap gap-3"></div>
                </div>
            </div>

            <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
                <div class="card bg-slate-800 text-white flex items-center justify-between">
                    <div><p class="text-white/50 font-bold text-xs">總支出 (TWD)</p><p id="totalSpent" class="text-4xl font-black mt-2">$0</p></div>
                    <div class="w-32 h-32"><canvas id="expenseChart"></canvas></div>
                </div>
                <div class="card"><h3 class="font-bold mb-4 text-sm">💰 個人結餘</h3><div id="balanceList" class="grid grid-cols-1 gap-2"></div></div>
            </div>

            <div class="card border-2 border-dashed border-blue-200 bg-blue-50/30">
                <h3 class="font-black mb-4 text-sm text-blue-600"><i class="fa-solid fa-paper-plane mr-2"></i>轉帳建議</h3>
                <div id="settlementAdvice" class="grid grid-cols-1 md:grid-cols-2 gap-3"></div>
            </div>

            <div class="card p-0 overflow-hidden">
                <div class="overflow-x-auto">
                    <table class="w-full text-left">
                        <thead class="bg-gray-50 border-b text-[10px] font-black text-gray-400 uppercase">
                            <tr id="tableHeader"></tr>
                        </thead>
                        <tbody id="expenseTable" class="text-xs divide-y"></tbody>
                    </table>
                </div>
            </div>
        </div>
    </main>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getFirestore, doc, onSnapshot, setDoc } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

        const firebaseConfig = { apiKey: "AIzaSyCLz4iTnKXkba26S4fRUdV6d0DTZiRXSg0", authDomain: "travel-expense-7dbaa.firebaseapp.com", projectId: "travel-expense-7dbaa", storageBucket: "travel-expense-7dbaa.firebasestorage.app", messagingSenderId: "745263115640", appId: "1:745263115640:web:5714e2c1d041969ecaec8d" };
        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);
        const tripsRef = doc(db, "travelData", "master_record");

        const AVATARS = ['https://cdn-icons-png.flaticon.com/512/3135/3135715.png', 'https://cdn-icons-png.flaticon.com/512/4140/4140048.png', 'https://cdn-icons-png.flaticon.com/512/1999/1999625.png', 'https://cdn-icons-png.flaticon.com/512/236/236831.png', 'https://cdn-icons-png.flaticon.com/512/4139/4139981.png', 'https://cdn-icons-png.flaticon.com/512/3135/3135768.png', 'https://cdn-icons-png.flaticon.com/512/194/194938.png', 'https://cdn-icons-png.flaticon.com/512/6997/6997662.png', 'https://cdn-icons-png.flaticon.com/512/4140/4140047.png', 'https://cdn-icons-png.flaticon.com/512/1154/1154444.png'];

        window.trips = [];
        window.currentTripId = localStorage.getItem('trip_v1_id') || "";
        window.selectedMembers = [];
        let chartObj = null;

        onSnapshot(tripsRef, (docSnap) => {
            if (docSnap.exists()) {
                window.trips = docSnap.data().trips || [];
                if (!window.currentTripId && window.trips.length > 0) window.currentTripId = window.trips[0].id;
                render();
            }
        });

        async function saveToCloud(action) {
            const trip = window.trips.find(t => String(t.id) === String(window.currentTripId));
            if (trip) {
                if (!trip.history) trip.history = [];
                trip.history.unshift({
                    time: new Date().toLocaleString(),
                    action: action,
                    data: JSON.parse(JSON.stringify(trip.data || [])),
                    members: JSON.parse(JSON.stringify(trip.members || [])),
                    customCurrencies: JSON.parse(JSON.stringify(trip.customCurrencies || {}))
                });
                if (trip.history.length > 15) trip.history.pop();
            }
            await setDoc(tripsRef, { trips: window.trips });
        }

        // --- 幣別功能 ---
        window.addNewCurrency = async () => {
            const code = document.getElementById('newCurrencyCode').value.toUpperCase().trim();
            const rate = parseFloat(document.getElementById('newCurrencyRate').value);
            if (!code || isNaN(rate)) return alert("請輸入正確代碼與匯率");

            const trip = window.trips.find(t => String(t.id) === String(window.currentTripId));
            if (!trip.customCurrencies) trip.customCurrencies = {};
            trip.customCurrencies[code] = rate;
            
            document.getElementById('newCurrencyCode').value = "";
            document.getElementById('newCurrencyRate').value = "";
            await saveToCloud(`新增幣別: ${code}`);
        };

        window.deleteCurrency = async (code) => {
            if (!confirm(`確定要刪除 ${code} 嗎？`)) return;
            const trip = window.trips.find(t => String(t.id) === String(window.currentTripId));
            if (trip.customCurrencies) {
                delete trip.customCurrencies[code];
                await saveToCloud(`刪除幣別: ${code}`);
            }
        };

        window.fetchLatestRates = async () => {
            const btn = event.currentTarget;
            const originalText = btn.innerHTML;
            btn.innerHTML = '<i class="fa-solid fa-spinner fa-spin mr-1"></i>抓取中...';
            try {
                const res = await fetch('https://open.er-api.com/v6/latest/TWD');
                const data = await res.json();
                if (data && data.rates) {
                    const trip = window.trips.find(t => String(t.id) === String(window.currentTripId));
                    if (!trip.customCurrencies) trip.customCurrencies = {};
                    if (data.rates.JPY) trip.customCurrencies['JPY'] = parseFloat((1 / data.rates.JPY).toFixed(4));
                    if (data.rates.EUR) trip.customCurrencies['EUR'] = parseFloat((1 / data.rates.EUR).toFixed(2));
                    await saveToCloud("手動更新匯率");
                    alert("JPY/EUR 匯率已更新！");
                }
            } catch (e) { alert("連線失敗"); }
            finally { btn.innerHTML = originalText; }
        };

        // --- 核心渲染 ---
        function render() {
            const trip = window.trips.find(t => String(t.id) === String(window.currentTripId));
            if (!trip) return;

            document.getElementById('tripTitle').innerText = trip.name;
            document.getElementById('tripDropdown').innerHTML = window.trips.map(t => `<option value="${t.id}" ${String(t.id) === String(window.currentTripId) ? 'selected' : ''}>${t.name}</option>`).join('');

            const curs = trip.customCurrencies || {};
            let curOptions = `<option value="TWD" data-rate="1">TWD (1.0)</option>`;
            let curListHtml = "";
            Object.keys(curs).forEach(code => {
                curOptions += `<option value="${code}" data-rate="${curs[code]}">${code} (${curs[code]})</option>`;
                curListHtml += `
                    <div class="flex items-center gap-2 bg-white/20 px-3 py-1 rounded-full text-[11px] font-bold">
                        <span>${code}: ${curs[code]}</span>
                        <i class="fa-solid fa-times cursor-pointer hover:text-red-400" onclick="deleteCurrency('${code}')"></i>
                    </div>`;
            });
            document.getElementById('currencySelect').innerHTML = curOptions;
            document.getElementById('currencyList').innerHTML = curListHtml || '<span class="text-white/30 text-[10px]">尚無自訂幣別</span>';

            document.getElementById('payerSelect').innerHTML = trip.members.map(m => `<option value="${m.name}">${m.name}</option>`).join('');
            document.getElementById('memberManageList').innerHTML = trip.members.map((m, i) => `
                <div class="flex items-center gap-2 bg-white/10 p-2 rounded-xl">
                    <img src="${m.photo}" class="avatar" onclick="openAvatarPicker(${i})">
                    <span class="text-xs font-bold">${m.name}</span>
                    <button onclick="deleteMember(${i})" class="text-red-400 ml-1"><i class="fa-solid fa-times"></i></button>
                </div>`).join('');

            if (window.selectedMembers.length === 0) window.selectedMembers = trip.members.map(m => m.name);
            document.getElementById('memberCheckGrid').innerHTML = trip.members.map(m => `
                <div class="flex items-center gap-2 bg-gray-50 px-3 py-2 rounded-xl border border-gray-200 cursor-pointer" onclick="toggleMember('${m.name}')">
                    <i class="fa-solid ${window.selectedMembers.includes(m.name) ? 'fa-circle-check text-blue-500' : 'fa-circle text-gray-300'}"></i>
                    <span class="text-xs font-bold">${m.name}</span>
                </div>`).join('');

            document.getElementById('historyList').innerHTML = (trip.history || []).map((h, i) => `
                <div class="history-item">
                    <span><b>${h.action}</b> (${h.time})</span>
                    <button onclick="restoreHistory(${i})" class="bg-blue-600 px-2 py-1 rounded text-[10px]">還原</button>
                </div>`).join('');

            calculate(trip);
        }

        function calculate(trip) {
            let totalTWD = 0;
            let balances = {};
            trip.members.forEach(m => balances[m.name] = 0);

            let header = `<th class="p-4">項目</th><th class="p-4">付款人</th><th class="p-4">台幣</th>`;
            trip.members.forEach(m => header += `<th class="p-4 text-center">${m.name}</th>`);
            header += `<th class="p-4 text-center">刪</th>`;
            document.getElementById('tableHeader').innerHTML = header;

            const rows = trip.data.map(d => {
                totalTWD += d.amount;
                balances[d.payer] += d.amount;
                const split = d.amount / d.participants.length;
                d.participants.forEach(p => { if(balances[p] !== undefined) balances[p] -= split; });

                return `<tr>
                    <td class="p-4"><b>${d.name}</b><br><span class="text-[9px] text-gray-400">${d.rateInfo || ''}</span></td>
                    <td class="p-4 text-gray-500">${d.payer}</td>
                    <td class="p-4 font-black text-blue-600">$${Math.round(d.amount)}</td>
                    ${trip.members.map(m => `<td class="p-4 text-center ${d.participants.includes(m.name) ? 'text-blue-500 font-bold' : 'text-gray-200'}">${d.participants.includes(m.name) ? Math.round(split) : '-'}</td>`).join('')}
                    <td class="p-4 text-center" onclick="deleteExpense(${d.id})"><i class="fa-solid fa-trash text-red-200 cursor-pointer"></i></td>
                </tr>`;
            }).join('');

            document.getElementById('expenseTable').innerHTML = rows;
            document.getElementById('totalSpent').innerText = `$${Math.round(totalTWD).toLocaleString()}`;
            document.getElementById('balanceList').innerHTML = trip.members.map(m => `
                <div class="flex justify-between items-center bg-gray-50 p-3 rounded-xl border border-gray-100">
                    <span class="font-bold text-xs">${m.name}</span>
                    <span class="font-black ${balances[m.name] >= 0 ? 'text-green-600' : 'text-red-600'}">${balances[m.name] >= 0 ? '+' : ''}${Math.round(balances[m.name])}</span>
                </div>`).join('');

            updateChart(trip);
            renderAdvice(balances);
        }

        window.addExpenseRow = async () => {
            const name = document.getElementById('itemName').value;
            const amt = parseFloat(document.getElementById('amount').value);
            const sel = document.getElementById('currencySelect');
            const rate = parseFloat(sel.options[sel.selectedIndex].dataset.rate);
            const payer = document.getElementById('payerSelect').value;
            
            if (!name || isNaN(amt) || window.selectedMembers.length === 0) return alert("資訊未填齊");

            const trip = window.trips.find(t => String(t.id) === String(window.currentTripId));
            trip.data.push({
                id: Date.now(),
                name,
                amount: amt * rate,
                payer,
                participants: [...window.selectedMembers],
                rateInfo: sel.value !== 'TWD' ? `(${amt} ${sel.value} @ ${rate})` : ""
            });

            document.getElementById('itemName').value = "";
            document.getElementById('amount').value = "";
            await saveToCloud(`新增: ${name}`);
        };

        window.deleteExpense = async (id) => {
            const trip = window.trips.find(t => String(t.id) === String(window.currentTripId));
            trip.data = trip.data.filter(d => d.id !== id);
            await saveToCloud("刪除項目");
        };

        window.restoreHistory = async (idx) => {
            if (!confirm("還原？")) return;
            const trip = window.trips.find(t => String(t.id) === String(window.currentTripId));
            const target = trip.history[idx];
            trip.data = target.data;
            trip.members = target.members;
            trip.customCurrencies = target.customCurrencies || {};
            await setDoc(tripsRef, { trips: window.trips });
            window.location.reload();
        };

        window.toggleMember = (name) => {
            if (window.selectedMembers.includes(name)) window.selectedMembers = window.selectedMembers.filter(n => n !== name);
            else window.selectedMembers.push(name);
            render();
        };

        function renderAdvice(balances) {
            let p = [], r = [];
            Object.keys(balances).forEach(n => {
                if (balances[n] > 1) r.push({n, amt: balances[n]});
                else if (balances[n] < -1) p.push({n, amt: -balances[n]});
            });
            let adv = "";
            let i=0, j=0;
            while(i<p.length && j<r.length) {
                let m = Math.min(p[i].amt, r[j].amt);
                adv += `<div class=\"bg-white p-3 rounded-xl shadow-sm flex justify-between items-center\"><div class=\"flex items-center gap-2\"><b class=\"text-xs\">${p[i].n}</b><i class=\"fa-solid fa-arrow-right text-[10px] text-gray-300\"></i><b class=\"text-xs\">${r[j].n}</b></div><b class=\"text-blue-600\">$${Math.round(m)}</b></div>`;
                p[i].amt -= m; r[j].amt -= m;
                if(p[i].amt < 1) i++; if(r[j].amt < 1) j++;
            }
            document.getElementById('settlementAdvice').innerHTML = adv || '<p class="text-xs text-gray-400">平衡</p>';
        }

        function updateChart(trip) {
            const ctx = document.getElementById('expenseChart').getContext('2d');
            const dataMap = {};
            trip.data.forEach(d => { dataMap[d.payer] = (dataMap[d.payer] || 0) + d.amount; });
            if (chartObj) chartObj.destroy();
            chartObj = new Chart(ctx, {
                type: 'doughnut',
                data: { labels: Object.keys(dataMap), datasets: [{ data: Object.values(dataMap), backgroundColor: ['#3b82f6', '#10b981', '#f59e0b', '#ef4444', '#8b5cf6'] }] },
                options: { plugins: { legend: { display: false } }, cutout: '70%' }
            });
        }

        window.toggleTools = () => document.getElementById('toolPanel').classList.toggle('expanded');
        window.switchTrip = (id) => { window.currentTripId = id; localStorage.setItem('trip_v1_id', id); render(); };
        window.updateTripName = async () => {
            const name = document.getElementById('tripTitle').innerText.trim();
            const trip = window.trips.find(t => String(t.id) === String(window.currentTripId));
            if (trip && name && trip.name !== name) { trip.name = name; await saveToCloud("更名"); }
        };
        window.createNewTrip = async () => {
            const name = prompt("名稱:");
            if (!name) return;
            const newTrip = { id: Date.now(), name, members: [{ name: "Paul", photo: AVATARS[0] }], data: [], customCurrencies: {}, history: [] };
            window.trips.push(newTrip);
            await setDoc(tripsRef, { trips: window.trips });
            window.switchTrip(newTrip.id);
        };
        window.deleteTripBtn = async () => {
            if(!confirm("確定？")) return;
            window.trips = window.trips.filter(t => String(t.id) !== String(window.currentTripId));
            await setDoc(tripsRef, { trips: window.trips });
            window.location.reload();
        };
        let activeIdx = -1;
        window.openAvatarPicker = (i) => { activeIdx = i; document.getElementById('avatarPicker').style.display='block'; };
        window.closeAvatarPicker = () => document.getElementById('avatarPicker').style.display='none';
        window.selectAvatar = async (i) => {
            const trip = window.trips.find(t => String(t.id) === String(window.currentTripId));
            trip.members[activeIdx].photo = AVATARS[i];
            closeAvatarPicker();
            await saveToCloud("換頭像");
        };
        window.addMember = async () => {
            const n = prompt("姓名:");
            if (!n) return;
            const trip = window.trips.find(t => String(t.id) === String(window.currentTripId));
            trip.members.push({ name: n, photo: AVATARS[0] });
            await saveToCloud(`加人: ${n}`);
        };
        window.deleteMember = async (i) => {
            const trip = window.trips.find(t => String(t.id) === String(window.currentTripId));
            trip.members.splice(i, 1);
            await saveToCloud("刪人");
        };
        document.getElementById('avatarGrid').innerHTML = AVATARS.map((url, i) => `<img src="${url}" class="w-10 h-10 rounded-full cursor-pointer hover:scale-110" onclick="selectAvatar(${i})">`).join('');
    </script>
</body>
</html>
