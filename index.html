<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>分帳神器</title>

<script src="https://cdn.tailwindcss.com"></script>
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">

<style>
:root { --primary:#3b82f6; --bg:#f8fafc; }
body { font-family:"PingFang TC"; background:var(--bg); }

/* 共用 */
.card { background:#fff; border-radius:20px; transition:.4s; }
.card:hover { transform:translateY(-3px) scale(1.01); }

/* 主題 */
.theme-spring .card { border:3px dashed #34d399; transform:rotate(-1deg); }
.theme-summer .card { box-shadow:0 10px 0 #fcd34d; border-radius:30px; }
.theme-autumn .card { border-left:8px solid #ef4444; border-radius:0; }
.theme-winter .card { backdrop-filter:blur(20px); background:rgba(255,255,255,.7); }
</style>
</head>

<body class="pb-20">

<!-- NAV -->
<nav class="p-4 flex justify-between items-center bg-white shadow">
<input id="tripTitle"
    class="text-xl font-black bg-transparent border-b border-transparent focus:border-blue-500 outline-none"
    onblur="saveTripName(this.value)"
    value="載入中..."/>
</nav>

<!-- HEADER -->
<header class="bg-slate-900 text-white p-6">
<div class="flex gap-3 overflow-x-auto" id="memberStatsHeader"></div>
</header>

<!-- MAIN -->
<main class="max-w-6xl mx-auto p-6 grid lg:grid-cols-4 gap-6">

<!-- 左側 -->
<div class="card p-4">
<input id="itemName" placeholder="項目" class="w-full mb-2 border p-2 rounded">

<input id="amount" type="number" placeholder="金額" class="w-full mb-2 border p-2 rounded">

<select id="payer" class="w-full mb-2 border p-2"></select>

<button onclick="toggleSplitMode()" class="text-blue-500 text-xs mb-2" id="splitModeBtn">
切換：指定金額
</button>

<div id="memberCheckGrid"></div>

<button onclick="addExpense()" class="w-full bg-blue-500 text-white p-3 mt-3 rounded">
新增
</button>
</div>

<!-- 右側 -->
<div class="lg:col-span-3 space-y-6">

<div class="card p-6 bg-slate-800 text-white">
<div id="totalSpent">$0</div>
</div>

<table class="w-full text-sm">
<thead id="dynamicHeader"></thead>
<tbody id="expenseList"></tbody>
</table>

<!-- ✅ 轉帳在最底 -->
<div class="card p-6 border-dashed border">
<h3>轉帳建議</h3>
<div id="settlementAdvice"></div>
</div>

</div>
</main>

<script>
let trips=[{
id:1,
name:"TEST",
members:[{name:"Paul"},{name:"Mia"},{name:"Vivien"}],
data:[]
}];

let currentTripId=1;
let isCustomSplit=false;

function refreshAll(){
let trip=trips[0];

document.getElementById('tripTitle').value=trip.name;

document.getElementById('payer').innerHTML=
trip.members.map(m=>`<option>${m.name}</option>`).join("");

document.getElementById('memberCheckGrid').innerHTML=
trip.members.map(m=>`
<div class="flex gap-2 items-center">
<input type="checkbox" checked value="${m.name}">
<span>${m.name}</span>
<input class="custom hidden border w-16" placeholder="金額">
</div>`).join("");

// header stats
let paid={}, owe={};
trip.members.forEach(m=>{paid[m.name]=0;owe[m.name]=0;});

trip.data.forEach(d=>{
paid[d.payer]+=d.amount;

trip.members.forEach(m=>{
let cost=0;
if(d.custom && d.custom[m.name]) cost=d.custom[m.name];
else if(d.part.includes(m.name)) cost=d.amount/d.part.length;

owe[m.name]+=cost;
});
});

document.getElementById('memberStatsHeader').innerHTML=
trip.members.map(m=>{
let net=paid[m.name]-owe[m.name];
return `
<div class="bg-white/10 p-3 rounded">
<div>${m.name}</div>
<div>代墊 $${paid[m.name]}</div>
<div>應付 $${owe[m.name]}</div>
<div class="${net>=0?'text-green-400':'text-red-400'}">
淨額 $${net}
</div>
</div>`;
}).join("");

// table
document.getElementById('expenseList').innerHTML=
trip.data.map(d=>`
<tr>
<td>${d.name}</td>
<td>${d.payer}</td>
<td>$${d.amount}</td>
</tr>`).join("");

calcSettlement();
}

function saveTripName(v){
trips[0].name=v;
}

function toggleSplitMode(){
isCustomSplit=!isCustomSplit;
document.querySelectorAll('.custom').forEach(el=>{
el.classList.toggle('hidden');
});
}

function addExpense(){
let name=itemName.value;
let amount=parseFloat(amountInput.value);

let checks=document.querySelectorAll('#memberCheckGrid input[type=checkbox]');
let parts=[...checks].filter(c=>c.checked).map(c=>c.value);

let custom={};
if(isCustomSplit){
let inputs=document.querySelectorAll('.custom');
let sum=0;

inputs.forEach((i,idx)=>{
let v=parseFloat(i.value)||0;
if(v>0){
custom[trips[0].members[idx].name]=v;
sum+=v;
}
});

// auto補差額
let diff=amount-sum;
let first=Object.keys(custom)[0];
if(first) custom[first]+=diff;
}

trips[0].data.unshift({
name,
amount,
payer:payer.value,
part:parts,
custom:isCustomSplit?custom:null
});

refreshAll();
}

function calcSettlement(){
let trip=trips[0];
let balance={};

trip.members.forEach(m=>balance[m.name]=0);

trip.data.forEach(d=>{
trip.members.forEach(m=>{
let cost=0;
if(d.custom && d.custom[m.name]) cost=d.custom[m.name];
else if(d.part.includes(m.name)) cost=d.amount/d.part.length;

balance[d.payer]+=cost;
balance[m.name]-=cost;
});
});

let debt=[],credit=[];
for(let k in balance){
if(balance[k]<0) debt.push({n:k,v:-balance[k]});
if(balance[k]>0) credit.push({n:k,v:balance[k]});
}

let html="";
while(debt.length && credit.length){
let v=Math.min(debt[0].v,credit[0].v);
html+=`<div>${debt[0].n} → ${credit[0].n} $${Math.round(v)}</div>`;
debt[0].v-=v; credit[0].v-=v;
if(debt[0].v<1) debt.shift();
if(credit[0].v<1) credit.shift();
}

document.getElementById('settlementAdvice').innerHTML=html;
}

// 主題
function applyTheme(t){
document.body.className='pb-20';
if(t!=='classic') document.body.classList.add('theme-'+t);
}

refreshAll();
</script>

</body>
</html>
